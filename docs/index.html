<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Docker 镜像批量下载器 | 加速拉取 · 一键复制</title>
<!-- 使用更现代的字体与图标库 -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  body { background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%); background-attachment: fixed; }
  .card-gradient {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(0px);
    transition: all 0.2s ease;
  }
  .task-item {
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
  }
  .task-item:hover {
    background-color: #f9fafb;
    transform: translateX(2px);
  }
  .copy-btn {
    transition: all 0.2s;
  }
  .copy-btn:active { transform: scale(0.96); }
  .scrollbar-custom::-webkit-scrollbar {
    width: 6px;
  }
  .scrollbar-custom::-webkit-scrollbar-track {
    background: #e2e8f0;
    border-radius: 8px;
  }
  .scrollbar-custom::-webkit-scrollbar-thumb {
    background: #94a3b8;
    border-radius: 8px;
  }
  .glow-focus:focus {
    outline: none;
    ring: 2px solid #10b981;
    border-color: #10b981;
    box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
  }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-5">

<div class="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-2 gap-7">

  <!-- 左侧：下载表单（现代卡片） -->
  <div class="card-gradient bg-white/90 rounded-2xl shadow-xl border border-white/40 backdrop-blur-sm p-7 flex flex-col gap-6 transition-all">
    <div class="text-center space-y-2">
      <div class="inline-flex items-center justify-center bg-emerald-100 p-2 rounded-2xl mb-1">
        <i class="fab fa-docker text-3xl text-emerald-700"></i>
      </div>
      <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">批量镜像下载器</h1>
      <p class="text-gray-500 text-sm">支持多行镜像 · 触发后自动生成下载地址</p>
    </div>

    <form id="dockerForm" class="flex flex-col gap-5">
      <!-- 镜像列表 -->
      <div>
        <label class="block font-semibold text-gray-700 mb-1.5 flex items-center gap-2">
          <i class="fas fa-list-ul text-emerald-600 text-sm"></i>
          <span>镜像名称 (每行一个)</span>
          <span class="text-xs text-red-400 ml-1">*</span>
        </label>
        <textarea id="imageList" placeholder="例如:&#10;linuxserver/obsidian:latest&#10;nginx:latest&#10;mysql:8.0"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-300 focus:border-emerald-400 transition bg-gray-50/50 font-mono text-sm"
          rows="6" required></textarea>
        <p class="text-xs text-gray-400 mt-1"><i class="fas fa-info-circle"></i> 支持标准格式: 镜像名[:tag] 或 仓库/镜像:tag</p>
      </div>

      <!-- 授权码 -->
      <div>
        <label class="block font-semibold text-gray-700 mb-1.5 flex items-center gap-2">
          <i class="fas fa-key text-amber-600 text-sm"></i>
          <span>授权码</span>
          <span class="text-xs text-red-400 ml-1">*</span>
        </label>
        <div class="relative">
          <input type="password" id="apiKey" placeholder="请输入授权码"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 pr-10 focus:ring-2 focus:ring-emerald-300 focus:border-emerald-400 transition bg-gray-50/50"
            required>
          <i class="fas fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
        </div>
      </div>

      <!-- 镜像加速地址（新增） -->
      <div>
        <label class="block font-semibold text-gray-700 mb-1.5 flex items-center gap-2">
          <i class="fas fa-tachometer-alt text-blue-500 text-sm"></i>
          <span>镜像加速地址 (可选)</span>
          <span class="text-xs text-gray-400">拼接为: 加速地址/原始下载URL</span>
        </label>
        <div class="flex items-center gap-2">
          <div class="relative flex-1">
            <input type="text" id="mirrorPrefix" placeholder="例如: https://mirror.example.com 或 https://docker-proxy.cloud"
              class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-300 focus:border-emerald-400 transition bg-gray-50/50">
            <i class="fas fa-globe absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
          </div>
          <button type="button" id="clearMirror" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-xl transition text-gray-600" title="清空加速地址">
            <i class="fas fa-times-circle"></i>
          </button>
        </div>
        <p class="text-xs text-gray-400 mt-1"><i class="fas fa-link"></i> 填写后将自动拼接: <span class="font-mono bg-gray-100 px-1 rounded">加速地址/原始下载链接</span> (复制地址时生效)</p>
      </div>

      <button type="submit" id="submitBtn" class="mt-3 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 transform hover:scale-[1.01] active:scale-[0.99]">
        <i class="fas fa-cloud-download-alt"></i>
        <span>开始批量下载 / 触发任务</span>
      </button>
    </form>

    <div class="border-t border-gray-200/80 pt-3 text-center text-xs text-gray-400">
      <i class="far fa-clock"></i> 每个镜像独立触发 · 成功后显示下载地址
    </div>
  </div>

  <!-- 右侧：下载状态面板 (精美列表 带复制按钮 + 加速拼接) -->
  <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-xl border border-white/40 flex flex-col h-full overflow-hidden">
    <div class="p-5 border-b border-gray-200/80 bg-white/50">
      <div class="flex items-center justify-between">
        <h2 class="text-xl font-bold flex items-center gap-2 text-gray-700">
          <i class="fas fa-tasks text-emerald-600"></i>
          <span>实时下载状态</span>
        </h2>
        <div class="flex gap-2">
          <button id="clearAllStatus" class="text-xs text-gray-400 hover:text-red-500 transition flex items-center gap-1 bg-gray-100 px-3 py-1.5 rounded-full">
            <i class="fas fa-trash-alt"></i> 清空记录
          </button>
          <span id="taskCounter" class="text-xs bg-gray-200 text-gray-600 px-2.5 py-1 rounded-full font-medium">0个任务</span>
        </div>
      </div>
    </div>
    <div id="statusPanel" class="flex-1 p-4 space-y-2.5 overflow-y-auto max-h-[60vh] md:max-h-[70vh] scrollbar-custom">
      <div class="flex flex-col items-center justify-center py-8 text-gray-400">
        <i class="fas fa-inbox text-4xl mb-2 opacity-50"></i>
        <p class="text-sm">暂无下载任务，添加镜像后点击“开始批量下载”</p>
      </div>
    </div>
  </div>
</div>

<script>
// -------- 配置 ----------
const WORKER_URL = 'https://download-docker-images.jianghangte.workers.dev';
const RELEASE_BASE_URL = 'https://github.com/jianghuaangte/download-docker-images/releases/download/';

// DOM 元素
const form = document.getElementById('dockerForm');
const imageListTextarea = document.getElementById('imageList');
const apiKeyInput = document.getElementById('apiKey');
const mirrorPrefixInput = document.getElementById('mirrorPrefix');
const clearMirrorBtn = document.getElementById('clearMirror');
const statusPanel = document.getElementById('statusPanel');
const submitBtn = document.getElementById('submitBtn');
const clearAllStatusBtn = document.getElementById('clearAllStatus');
const taskCounterSpan = document.getElementById('taskCounter');

// 存储每个镜像的状态行DOM元素引用 (用于更新)
let statusRowsMap = new Map();   // key: imageName, value: { containerDiv, statusSpan, actionWrapper, downloadLink, copyBtn, mirrorNotice? }

// 辅助函数：安全生成文件名 (镜像名转义)
function getTarName(image) {
  return image.replace(/[\/:]/g, '_') + '.tar.gz';
}

// 获取原始完整下载URL (不含加速前缀)
function getOriginalDownloadUrl(image) {
  const tarName = getTarName(image);
  return RELEASE_BASE_URL + tarName;
}

// 根据用户填写的镜像加速地址拼接最终下载地址 (如果加速地址不为空，则拼接: 加速地址(去除尾部斜杠) + '/' + 原始URL)
function getAcceleratedDownloadUrl(image) {
  const originalUrl = getOriginalDownloadUrl(image);
  let mirror = mirrorPrefixInput.value.trim();
  if (!mirror) {
    return originalUrl;
  }
  // 清理末尾的斜杠，确保拼接后不重复 /
  mirror = mirror.replace(/\/+$/, '');
  // 判断原始url是否以http://或https://开头，直接拼接即可
  return `${mirror}/${originalUrl}`;
}

// 复制到剪贴板的通用函数 (支持现代浏览器)
async function copyToClipboard(text, buttonElement, originalTextContent = null) {
  try {
    await navigator.clipboard.writeText(text);
    // 临时改变按钮文字/图标效果
    const originalHtml = buttonElement.innerHTML;
    buttonElement.innerHTML = '<i class="fas fa-check-circle"></i><span class="ml-1">已复制</span>';
    buttonElement.classList.add('bg-emerald-100', 'text-emerald-700');
    setTimeout(() => {
      if (originalTextContent !== null) {
        buttonElement.innerHTML = originalTextContent;
      } else {
        buttonElement.innerHTML = originalHtml;
      }
      buttonElement.classList.remove('bg-emerald-100', 'text-emerald-700');
    }, 1500);
  } catch (err) {
    // fallback 旧式方法
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    const originalHtml = buttonElement.innerHTML;
    buttonElement.innerHTML = '<i class="fas fa-check-circle"></i><span class="ml-1">已复制</span>';
    setTimeout(() => {
      buttonElement.innerHTML = originalHtml;
    }, 1200);
  }
}

// 更新右侧任务统计
function updateTaskCounter() {
  const count = statusRowsMap.size;
  taskCounterSpan.innerText = `${count}个任务`;
  if (count === 0) {
    // 如果没有任何任务则显示占位提示
    if (statusPanel.children.length === 0 || (statusPanel.children.length === 1 && statusPanel.children[0]?.innerText?.includes('暂无下载任务'))) {
      // 不用重复添加
    } else if (statusPanel.children.length === 0) {
      const emptyDiv = document.createElement('div');
      emptyDiv.className = "flex flex-col items-center justify-center py-8 text-gray-400";
      emptyDiv.innerHTML = '<i class="fas fa-inbox text-4xl mb-2 opacity-50"></i><p class="text-sm">暂无下载任务，添加镜像后点击“开始批量下载”</p>';
      statusPanel.appendChild(emptyDiv);
    }
  } else {
    // 移除空状态提示如果存在
    const placeholders = statusPanel.querySelectorAll('.empty-placeholder-style, .flex.flex-col.items-center.justify-center.py-8');
    placeholders.forEach(el => {
      if (el.innerText.includes('暂无下载任务')) el.remove();
    });
  }
}

// 清空所有状态记录（仅清空UI和内存Map）
clearAllStatusBtn.addEventListener('click', () => {
  if (statusRowsMap.size > 0 && confirm('确定要清空所有镜像的状态记录吗？不会取消已经触发的后台任务。')) {
    statusRowsMap.clear();
    renderEmptyStatusPanel();
    updateTaskCounter();
  } else if (statusRowsMap.size === 0) {
    // 已经是空
    renderEmptyStatusPanel();
  }
});

function renderEmptyStatusPanel() {
  statusPanel.innerHTML = '';
  const emptyDiv = document.createElement('div');
  emptyDiv.className = "flex flex-col items-center justify-center py-8 text-gray-400";
  emptyDiv.innerHTML = '<i class="fas fa-inbox text-4xl mb-2 opacity-50"></i><p class="text-sm">暂无下载任务，添加镜像后点击“开始批量下载”</p>';
  statusPanel.appendChild(emptyDiv);
}

// 清空加速按钮
clearMirrorBtn.addEventListener('click', () => {
  mirrorPrefixInput.value = '';
  // 刷新所有现有任务的“复制地址”按钮的目标地址 (动态显示加速后的地址)
  refreshAllCopyButtons();
});

// 加速地址变化时，刷新所有已经成功任务的复制按钮链接内容（实时更新）
function refreshAllCopyButtons() {
  for (let [imageName, elements] of statusRowsMap.entries()) {
    const { downloadLink, copyBtn, statusSpan } = elements;
    // 只对已成功的任务 (下载链接存在或显示为成功状态) 刷新复制地址
    if (downloadLink && downloadLink.href) {
      const acceleratedUrl = getAcceleratedDownloadUrl(imageName);
      // 更新downloadLink的href（下载属性）
      downloadLink.href = acceleratedUrl;
      // 更新复制按钮绑定的地址（移除旧的监听，重新绑定有点麻烦，直接更新dataset）
      if (copyBtn && copyBtn.dataset) {
        copyBtn.dataset.url = acceleratedUrl;
      }
      // 也可顺便改变提示
    }
  }
}

// 创建单行状态条目 (每个镜像的任务行)
function createStatusRow(imageName) {
  const containerDiv = document.createElement('div');
  containerDiv.className = "task-item bg-white rounded-xl border border-gray-200 shadow-sm p-3 transition-all";
  
  // 头部：镜像名 + 状态标识
  const headerDiv = document.createElement('div');
  headerDiv.className = "flex items-start justify-between gap-2 flex-wrap";
  
  const imageSpan = document.createElement('div');
  imageSpan.className = "flex items-center gap-2 flex-1 min-w-0";
  imageSpan.innerHTML = `<i class="fab fa-docker text-emerald-500 text-sm flex-shrink-0"></i><span class="font-mono text-sm font-medium text-gray-800 truncate" title="${escapeHtml(imageName)}">${escapeHtml(imageName)}</span>`;
  
  const statusSpan = document.createElement('span');
  statusSpan.className = "text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full whitespace-nowrap";
  statusSpan.innerText = "等待触发...";
  
  headerDiv.appendChild(imageSpan);
  headerDiv.appendChild(statusSpan);
  
  // 中间区域: 下载链接 + 复制按钮区域 (成功后显示)
  const actionWrapper = document.createElement('div');
  actionWrapper.className = "mt-3 flex items-center justify-between gap-2 flex-wrap";
  actionWrapper.style.display = "none"; // 初始隐藏
  
  const linkWrapper = document.createElement('div');
  linkWrapper.className = "flex-1 flex items-center gap-2 overflow-hidden";
  
  const downloadLink = document.createElement('a');
  downloadLink.className = "text-emerald-700 text-sm font-medium underline decoration-dotted underline-offset-2 hover:text-emerald-800 truncate flex items-center gap-1";
  downloadLink.target = "_blank";
  downloadLink.rel = "noopener noreferrer";
  downloadLink.innerHTML = '<i class="fas fa-download"></i><span class="truncate">获取下载链接</span>';
  
  const copyBtn = document.createElement('button');
  copyBtn.className = "copy-btn bg-gray-100 hover:bg-emerald-50 text-gray-700 hover:text-emerald-700 rounded-lg px-3 py-1.5 text-xs font-medium flex items-center gap-1 transition whitespace-nowrap";
  copyBtn.innerHTML = '<i class="far fa-copy"></i> 复制地址';
  
  linkWrapper.appendChild(downloadLink);
  actionWrapper.appendChild(linkWrapper);
  actionWrapper.appendChild(copyBtn);
  
  // 辅助显示加速标记 (可选)
  const mirrorHint = document.createElement('div');
  mirrorHint.className = "text-[10px] text-gray-400 mt-1.5 flex items-center gap-1";
  mirrorHint.innerHTML = '<i class="fas fa-link"></i> 下载地址已应用加速规则';
  mirrorHint.style.display = "none";
  
  containerDiv.appendChild(headerDiv);
  containerDiv.appendChild(actionWrapper);
  containerDiv.appendChild(mirrorHint);
  
  return { containerDiv, statusSpan, actionWrapper, downloadLink, copyBtn, mirrorHint };
}

// 简单防XSS
function escapeHtml(str) {
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
    return c;
  });
}

// 更新单个镜像的状态（触发中/成功/失败）
async function processImage(image, apiKey) {
  const record = statusRowsMap.get(image);
  if (!record) return;
  const { statusSpan, actionWrapper, downloadLink, copyBtn, mirrorHint, containerDiv } = record;
  // 更新为触发中
  statusSpan.innerText = "⏳ 触发中";
  statusSpan.className = "text-xs bg-amber-100 text-amber-700 px-2 py-1 rounded-full";
  
  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: image, key: apiKey })
    });
    
    let data;
    try {
      data = await response.json();
    } catch(e) {
      data = { success: false, message: await response.text() };
    }
    
    if (data && data.success) {
      // 成功
      statusSpan.innerText = "✅ 下载任务已触发";
      statusSpan.className = "text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full";
      
      // 生成最终下载地址 (根据是否配置加速)
      const finalDownloadUrl = getAcceleratedDownloadUrl(image);
      const originalRawUrl = getOriginalDownloadUrl(image);
      
      // 配置下载链接的显示与行为
      downloadLink.href = finalDownloadUrl;
      downloadLink.innerHTML = `<i class="fas fa-file-archive"></i><span class="truncate">${escapeHtml(finalDownloadUrl.length > 50 ? finalDownloadUrl.substring(0, 45) + '...' : finalDownloadUrl)}</span>`;
      downloadLink.title = finalDownloadUrl;
      
      // 复制按钮的点击事件：复制加速后的地址
      const copyHandler = () => {
        let urlToCopy = getAcceleratedDownloadUrl(image);
        copyToClipboard(urlToCopy, copyBtn, copyBtn.innerHTML);
      };
      // 移除旧的监听器，重新绑定
      copyBtn.removeEventListener('click', record._copyListener);
      copyBtn.addEventListener('click', copyHandler);
      record._copyListener = copyHandler;
      
      // 显示操作栏
      actionWrapper.style.display = "flex";
      
      // 如果启用了加速地址，显示提示
      if (mirrorPrefixInput.value.trim()) {
        mirrorHint.style.display = "flex";
        mirrorHint.innerHTML = `<i class="fas fa-rocket text-emerald-500"></i> 加速已启用 · 地址拼接: ${escapeHtml(mirrorPrefixInput.value.trim())}`;
      } else {
        mirrorHint.style.display = "none";
      }
      
      // 附加一个小彩蛋：如果复制按钮地址变化可刷新
      containerDiv.classList.remove("border-gray-200");
      containerDiv.classList.add("border-emerald-200", "bg-emerald-50/20");
      
    } else {
      // 失败
      const errMsg = data?.message || '未知错误';
      statusSpan.innerText = `❌ 触发失败`;
      statusSpan.className = "text-xs bg-red-100 text-red-700 px-2 py-1 rounded-full";
      const errorDiv = document.createElement('div');
      errorDiv.className = "text-red-500 text-xs mt-2 bg-red-50 p-1.5 rounded break-all";
      errorDiv.innerText = `错误: ${errMsg}`;
      containerDiv.appendChild(errorDiv);
      actionWrapper.style.display = "none";
    }
  } catch (err) {
    statusSpan.innerText = `❌ 请求出错`;
    statusSpan.className = "text-xs bg-red-100 text-red-700 px-2 py-1 rounded-full";
    const errDiv = document.createElement('div');
    errDiv.className = "text-red-500 text-xs mt-2 bg-red-50 p-1.5 rounded";
    errDiv.innerText = `网络错误: ${err.message}`;
    containerDiv.appendChild(errDiv);
    actionWrapper.style.display = "none";
  }
}

// 监听镜像加速地址变化实时更新已经成功条目的下载链接（如果已经成功）
mirrorPrefixInput.addEventListener('input', () => {
  // 实时刷新已显示任务的下载地址和复制地址
  for (let [imageName, record] of statusRowsMap.entries()) {
    const { downloadLink, statusSpan, mirrorHint, actionWrapper } = record;
    // 仅当任务已触发成功（即actionWrapper可见时）才动态更新
    if (actionWrapper && actionWrapper.style.display === 'flex') {
      const newAccUrl = getAcceleratedDownloadUrl(imageName);
      if (downloadLink) {
        downloadLink.href = newAccUrl;
        downloadLink.innerHTML = `<i class="fas fa-file-archive"></i><span class="truncate">${escapeHtml(newAccUrl.length > 50 ? newAccUrl.substring(0, 45) + '...' : newAccUrl)}</span>`;
        downloadLink.title = newAccUrl;
      }
      // 更新复制按钮监听地址：由于复制函数调用getAcceleratedDownloadUrl也是动态获取，无需额外修改，但最好刷新绑定
      if (record._copyListener) {
        // 重新绑定以使得点击时获取最新加速地址，不用重新绑定也行因为getAcceleratedDownloadUrl每次调用都取最新mirror值
        // 确保复制时候使用最新mirror即可（已在copyToClipboard调用前再次获取最新）
        // 但需要更新copyBtn的点击事件内部调用 getAcceleratedDownloadUrl(imageName) ， 已经引用了外部函数，是最新的
      }
      // 更新镜像加速提示
      if (mirrorPrefixInput.value.trim()) {
        mirrorHint.style.display = "flex";
        mirrorHint.innerHTML = `<i class="fas fa-rocket text-emerald-500"></i> 加速已启用 · 当前前缀: ${escapeHtml(mirrorPrefixInput.value.trim())}`;
      } else {
        mirrorHint.style.display = "none";
      }
    }
  }
});

// 主提交逻辑
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const rawImages = imageListTextarea.value.trim();
  if (!rawImages) {
    alert("请至少输入一个Docker镜像名称");
    return;
  }
  const images = rawImages.split('\n').map(s => s.trim()).filter(s => s !== '');
  const key = apiKeyInput.value.trim();
  if (!key) {
    alert("授权码不能为空");
    return;
  }
  
  if (images.length === 0) {
    alert("请填写有效的镜像名称");
    return;
  }
  
  // 移除目前空状态占位符
  const emptyPlaceholder = statusPanel.querySelector('.flex.flex-col.items-center.justify-center.py-8');
  if (emptyPlaceholder && statusRowsMap.size === 0) emptyPlaceholder.remove();
  
  // 遍历每个镜像，若已存在则不再重复添加，但为了用户体验，如果已经存在任务但不重复创建，可更新状态？为了避免混乱，对于已存在的镜像不再重复生成行，但重新触发一次（允许重试）
  for (let img of images) {
    if (!statusRowsMap.has(img)) {
      // 新建任务行
      const { containerDiv, statusSpan, actionWrapper, downloadLink, copyBtn, mirrorHint } = createStatusRow(img);
      statusPanel.appendChild(containerDiv);
      statusRowsMap.set(img, {
        containerDiv, statusSpan, actionWrapper, downloadLink, copyBtn, mirrorHint,
        _copyListener: null
      });
    }
    // 触发下载（重新触发，允许覆盖之前失败状态）
    const record = statusRowsMap.get(img);
    // 如果之前有失败状态，先移除附加的错误div (保留成功触发后的干净)
    const extraErrorDivs = record.containerDiv.querySelectorAll('.text-red-500.text-xs.mt-2');
    extraErrorDivs.forEach(div => div.remove());
    // 重置样式部分
    record.statusSpan.innerText = "⏳ 等待触发...";
    record.statusSpan.className = "text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full";
    record.actionWrapper.style.display = "none";
    record.containerDiv.classList.remove("border-emerald-200", "bg-emerald-50/20");
    record.containerDiv.classList.add("border-gray-200");
    if (record.mirrorHint) record.mirrorHint.style.display = "none";
    // 启动异步处理
    processImage(img, key);
  }
  
  updateTaskCounter();
  // 滚动最新状态栏
  if (statusPanel.lastElementChild) {
    statusPanel.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
});

// 初始更新计数器(0)
updateTaskCounter();
</script>
</body>
</html>
