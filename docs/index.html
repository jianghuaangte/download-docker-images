<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Docker 镜像批量下载器 | 深色/浅色模式 | 文件检测</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<!-- 深色模式自定义覆盖样式 -->
<style>
  * { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  
  /* 基础过渡 */
  body, .glass-card, .task-item, button, a, .bg-white, .bg-gray-50, .border-gray-200, .border-gray-300 {
    transition: background-color 0.25s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
  }
  
  /* 浅色模式默认 (light) */
  :root {
    --bg-gradient-start: #f0f9ff;
    --bg-gradient-end: #e6f0fa;
    --card-bg: rgba(255,255,255,0.96);
    --card-border: rgba(255,255,255,0.3);
    --text-primary: #1e293b;
    --text-secondary: #475569;
    --border-light: #e2e8f0;
    --input-bg: #f9fafb;
    --badge-gray-bg: #f1f5f9;
    --badge-gray-text: #334155;
    --icon-docker: #10b981;
  }
  
  body {
    background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
    background-attachment: fixed;
  }
  
  /* 深色模式 */
  body.dark {
    --bg-gradient-start: #0f172a;
    --bg-gradient-end: #1e293b;
    --card-bg: rgba(30, 41, 59, 0.95);
    --card-border: rgba(71, 85, 105, 0.5);
    --text-primary: #f1f5f9;
    --text-secondary: #cbd5e1;
    --border-light: #334155;
    --input-bg: #1e293b;
    --badge-gray-bg: #334155;
    --badge-gray-text: #cbd5e6;
    --icon-docker: #34d399;
  }
  
  body.dark .glass-card {
    background: var(--card-bg);
    border-color: var(--card-border);
  }
  
  body.dark .task-item {
    background-color: #1e293b;
    border-color: #334155;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  
  body.dark .task-item:hover {
    background-color: #2d3a4e;
  }
  
  body.dark input, body.dark textarea {
    background-color: #0f172a;
    border-color: #475569;
    color: #e2e8f0;
  }
  
  body.dark input:focus, body.dark textarea:focus {
    border-color: #10b981;
    ring-color: #10b981;
  }
  
  body.dark .border-gray-200, body.dark .border-gray-300 {
    border-color: #334155;
  }
  
  body.dark .bg-gray-50, body.dark .bg-gray-100 {
    background-color: #1e293b;
  }
  
  body.dark .text-gray-500, body.dark .text-gray-400, body.dark .text-gray-600 {
    color: #94a3b8;
  }
  
  body.dark .text-gray-700, body.dark .text-gray-800 {
    color: #e2e8f0;
  }
  
  body.dark .bg-white\/90, body.dark .bg-white\/95, body.dark .bg-white {
    background-color: #1e293b !important;
  }
  
  body.dark .bg-emerald-50 {
    background-color: #064e3b;
  }
  
  body.dark .bg-indigo-50 {
    background-color: #1e1b4b;
  }
  
  body.dark button.bg-gray-100 {
    background-color: #334155;
    color: #cbd5e1;
  }
  
  body.dark button.bg-gray-100:hover {
    background-color: #475569;
  }
  
  body.dark .status-badge.bg-gray-100 {
    background-color: #334155;
    color: #cbd5e1;
  }
  
  body.dark .copy-btn.bg-gray-100 {
    background-color: #334155;
    color: #cbd5e1;
  }
  
  body.dark .check-btn.bg-indigo-50 {
    background-color: #312e81;
    color: #a5b4fc;
  }
  
  body.dark .download-btn.bg-emerald-100 {
    background-color: #065f46;
    color: #6ee7b7;
  }
  
  .glass-card {
    background: var(--card-bg);
    backdrop-filter: blur(0px);
    border: 1px solid var(--card-border);
  }
  
  .scrollbar-custom::-webkit-scrollbar {
    width: 6px;
  }
  .scrollbar-custom::-webkit-scrollbar-track {
    background: #e2e8f0;
    border-radius: 8px;
  }
  .scrollbar-custom::-webkit-scrollbar-thumb {
    background: #94a3b8;
    border-radius: 8px;
  }
  body.dark .scrollbar-custom::-webkit-scrollbar-track {
    background: #1e293b;
  }
  body.dark .scrollbar-custom::-webkit-scrollbar-thumb {
    background: #475569;
  }
  
  .btn-hover-scale {
    transition: transform 0.1s ease;
  }
  .btn-hover-scale:active {
    transform: scale(0.97);
  }
  .theme-toggle {
    cursor: pointer;
    transition: all 0.2s;
  }
  .theme-toggle:hover {
    transform: scale(1.05);
  }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-5 relative">

<!-- 顶部右侧主题切换按钮 -->
<div class="fixed top-5 right-5 z-50">
  <button id="themeToggle" class="theme-toggle bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm p-3 rounded-full shadow-lg border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-200 hover:shadow-xl transition-all">
    <i id="themeIcon" class="fas fa-moon text-xl"></i>
  </button>
</div>

<div class="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-2 gap-7">

  <!-- 左侧：下载表单 -->
  <div class="glass-card rounded-2xl shadow-2xl p-7 flex flex-col gap-6 transition-all">
    <div class="text-center space-y-2">
      <div class="inline-flex items-center justify-center bg-gradient-to-br from-emerald-500 to-teal-600 p-2.5 rounded-2xl shadow-md">
        <i class="fab fa-docker text-3xl text-white"></i>
      </div>
      <h1 class="text-3xl font-bold tracking-tight text-gray-800 dark:text-gray-100">批量镜像下载器</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm">触发 Worker 生成镜像 · 检测 Release 文件 · 支持 GitHub 加速</p>
    </div>

    <form id="dockerForm" class="flex flex-col gap-5">
      <!-- 镜像列表 -->
      <div>
        <label class="block font-semibold text-gray-700 dark:text-gray-200 mb-1.5 flex items-center gap-2">
          <i class="fas fa-list-ul text-emerald-600 dark:text-emerald-400 text-sm"></i>
          <span>镜像名称 (每行一个)</span>
          <span class="text-xs text-red-400 ml-1">*</span>
        </label>
        <textarea id="imageList" placeholder="例如:&#10;linuxserver/obsidian:latest&#10;nginx:1.25&#10;mysql:8.0"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 transition bg-gray-50 dark:bg-gray-800 dark:text-gray-100 font-mono text-sm"
          rows="6" required></textarea>
        <p class="text-xs text-gray-400 dark:text-gray-500 mt-1"><i class="fas fa-info-circle"></i> 支持格式: 镜像名[:tag] , 会自动将 / : 替换为 _</p>
      </div>

      <!-- 授权码 -->
      <div>
        <label class="block font-semibold text-gray-700 dark:text-gray-200 mb-1.5 flex items-center gap-2">
          <i class="fas fa-key text-amber-600 dark:text-amber-400 text-sm"></i>
          <span>授权码</span>
          <span class="text-xs text-red-400 ml-1">*</span>
        </label>
        <div class="relative">
          <input type="password" id="apiKey" placeholder="请输入授权码"
            class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-3 pr-10 focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 transition bg-gray-50 dark:bg-gray-800 dark:text-gray-100"
            required>
          <i class="fas fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 text-sm"></i>
        </div>
      </div>

      <!-- GitHub 加速地址 -->
      <div>
        <label class="block font-semibold text-gray-700 dark:text-gray-200 mb-1.5 flex items-center gap-2">
          <i class="fas fa-tachometer-alt text-blue-500 dark:text-blue-400 text-sm"></i>
          <span>GitHub 加速地址</span>
          <span class="text-xs text-gray-500 dark:text-gray-400">用于拼接下载链接</span>
        </label>
        <div class="flex items-center gap-2">
          <div class="relative flex-1">
            <input type="text" id="mirrorPrefix" value="https://ghfast.top" placeholder="例如: https://ghfast.top"
              class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-400 transition bg-gray-50 dark:bg-gray-800 dark:text-gray-100">
            <i class="fas fa-globe absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 text-sm"></i>
          </div>
          <button type="button" id="resetMirror" class="px-3 py-2 bg-emerald-50 dark:bg-emerald-900/40 hover:bg-emerald-100 dark:hover:bg-emerald-800 rounded-xl transition text-emerald-700 dark:text-emerald-300 text-sm font-medium">
            <i class="fas fa-undo-alt"></i>
          </button>
          <button type="button" id="clearMirror" class="px-3 py-2 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-xl transition text-gray-600 dark:text-gray-300">
            <i class="fas fa-times-circle"></i>
          </button>
        </div>
        <p class="text-xs text-gray-400 dark:text-gray-500 mt-1"><i class="fas fa-link"></i> 最终下载地址 = 加速地址 + 原始GitHub地址</p>
      </div>

      <button type="submit" id="submitBtn" class="mt-2 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 btn-hover-scale">
        <i class="fas fa-cloud-download-alt"></i>
        <span>批量触发下载任务</span>
      </button>
    </form>

    <div class="border-t border-gray-200 dark:border-gray-700 pt-3 text-center text-xs text-gray-400 dark:text-gray-500">
      <i class="far fa-clock"></i> 触发后请点击「检测文件」确保镜像已构建完成再下载
    </div>
  </div>

  <!-- 右侧：状态面板 -->
  <div class="glass-card rounded-2xl shadow-2xl flex flex-col h-full overflow-hidden">
    <div class="p-5 border-b border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/30">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <h2 class="text-xl font-bold flex items-center gap-2 text-gray-700 dark:text-gray-200">
          <i class="fas fa-tasks text-emerald-600 dark:text-emerald-400"></i>
          <span>镜像任务状态</span>
        </h2>
        <div class="flex gap-2">
          <button id="clearAllStatus" class="text-xs text-gray-500 dark:text-gray-400 hover:text-red-600 dark:hover:text-red-400 transition flex items-center gap-1 bg-gray-100 dark:bg-gray-800 px-3 py-1.5 rounded-full">
            <i class="fas fa-trash-alt"></i> 清空记录
          </button>
          <span id="taskCounter" class="text-xs bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 px-2.5 py-1 rounded-full font-medium">0个任务</span>
        </div>
      </div>
    </div>
    <div id="statusPanel" class="flex-1 p-4 space-y-3 overflow-y-auto max-h-[60vh] md:max-h-[65vh] scrollbar-custom">
      <div class="flex flex-col items-center justify-center py-10 text-gray-400 dark:text-gray-500">
        <i class="fas fa-inbox text-5xl mb-3 opacity-40"></i>
        <p class="text-sm">暂无镜像任务</p>
        <p class="text-xs mt-1">输入镜像并点击批量触发</p>
      </div>
    </div>
  </div>
</div>

<script>
// ======================== 深色模式切换 ========================
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
// 检测本地存储或系统偏好
const getPreferredTheme = () => {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') return saved;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
};
let currentTheme = getPreferredTheme();
function applyTheme(theme) {
  if (theme === 'dark') {
    document.body.classList.add('dark');
    themeIcon.className = 'fas fa-sun text-xl';
  } else {
    document.body.classList.remove('dark');
    themeIcon.className = 'fas fa-moon text-xl';
  }
  localStorage.setItem('theme', theme);
}
applyTheme(currentTheme);
themeToggle.addEventListener('click', () => {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme(currentTheme);
  // 强制刷新所有任务面板中的加速地址显示细节（仅UI文字颜色自适应，无需额外逻辑）
  // 重新刷新一下现有的infoMsg颜色不影响功能，但保证动态适应
  for (let [img, record] of statusRowsMap.entries()) {
    if (record.infoMsg && record.downloadBtn && record.downloadBtn.href) {
      // 只做简单UI刷新无需额外动作，css自动覆盖
    }
  }
});

// ======================== 配置 ========================
const WORKER_URL = 'https://download-docker-images.jianghangte.workers.dev';
const RELEASE_TAG = 'docker-images';
const RELEASE_BASE_URL = `https://github.com/jianghuaangte/download-docker-images/releases/download/${RELEASE_TAG}/`;

const form = document.getElementById('dockerForm');
const imageListTextarea = document.getElementById('imageList');
const apiKeyInput = document.getElementById('apiKey');
const mirrorPrefixInput = document.getElementById('mirrorPrefix');
const resetMirrorBtn = document.getElementById('resetMirror');
const clearMirrorBtn = document.getElementById('clearMirror');
const statusPanel = document.getElementById('statusPanel');
const clearAllStatusBtn = document.getElementById('clearAllStatus');
const taskCounterSpan = document.getElementById('taskCounter');

let statusRowsMap = new Map();

function getTarFileName(image) {
  return image.replace(/[\/:]/g, '_') + '.tar.gz';
}

function getOriginalDownloadUrl(image) {
  return RELEASE_BASE_URL + getTarFileName(image);
}

function getAcceleratedDownloadUrl(image) {
  const originalUrl = getOriginalDownloadUrl(image);
  let mirror = mirrorPrefixInput.value.trim();
  if (!mirror) return originalUrl;
  mirror = mirror.replace(/\/+$/, '');
  return `${mirror}/${originalUrl}`;
}

async function checkFileExists(url) {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000);
    const response = await fetch(url, { method: 'HEAD', signal: controller.signal, cache: 'no-store' });
    clearTimeout(timeoutId);
    if (response.status === 200 || response.status === 302 || response.status === 304) return true;
    if (response.status === 404) return false;
    return response.ok;
  } catch (err) {
    return false;
  }
}

function updateTaskCounter() {
  taskCounterSpan.innerText = `${statusRowsMap.size}个任务`;
  if (statusRowsMap.size === 0 && statusPanel.children.length > 0) {
    const hasRealTask = Array.from(statusPanel.children).some(child => child.classList && child.classList.contains('task-item'));
    if (!hasRealTask) renderEmptyPanel();
  }
}

function renderEmptyPanel() {
  statusPanel.innerHTML = '';
  const emptyDiv = document.createElement('div');
  emptyDiv.className = "flex flex-col items-center justify-center py-10 text-gray-400 dark:text-gray-500";
  emptyDiv.innerHTML = '<i class="fas fa-inbox text-5xl mb-3 opacity-40"></i><p class="text-sm">暂无镜像任务</p><p class="text-xs mt-1">输入镜像并点击批量触发</p>';
  statusPanel.appendChild(emptyDiv);
}

function createTaskRow(imageName) {
  const container = document.createElement('div');
  container.className = "task-item bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm p-3 transition-all";
  
  const header = document.createElement('div');
  header.className = "flex items-center justify-between gap-2 flex-wrap mb-2";
  const imageTitle = document.createElement('div');
  imageTitle.className = "flex items-center gap-2 flex-1 min-w-0";
  imageTitle.innerHTML = `<i class="fab fa-docker text-emerald-500 dark:text-emerald-400 text-sm flex-shrink-0"></i><span class="font-mono text-sm font-semibold text-gray-800 dark:text-gray-100 truncate" title="${escapeHtml(imageName)}">${escapeHtml(imageName)}</span>`;
  const statusBadge = document.createElement('span');
  statusBadge.className = "status-badge text-xs bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-1 rounded-full whitespace-nowrap";
  statusBadge.innerText = "⏳ 等待触发";
  header.appendChild(imageTitle);
  header.appendChild(statusBadge);
  
  const actionBar = document.createElement('div');
  actionBar.className = "flex items-center justify-between gap-2 mt-2 flex-wrap";
  const leftBtns = document.createElement('div');
  leftBtns.className = "flex gap-2";
  
  const checkBtn = document.createElement('button');
  checkBtn.type = "button";
  checkBtn.className = "check-btn bg-indigo-50 dark:bg-indigo-900/40 hover:bg-indigo-100 dark:hover:bg-indigo-800 text-indigo-700 dark:text-indigo-300 text-xs font-medium px-3 py-1.5 rounded-lg transition flex items-center gap-1";
  checkBtn.innerHTML = '<i class="fas fa-search"></i> 检测文件';
  
  const downloadBtn = document.createElement('a');
  downloadBtn.className = "download-btn bg-gray-100 dark:bg-gray-700 text-gray-400 dark:text-gray-500 text-xs font-medium px-3 py-1.5 rounded-lg transition flex items-center gap-1 cursor-not-allowed";
  downloadBtn.innerHTML = '<i class="fas fa-download"></i> 下载';
  downloadBtn.style.pointerEvents = "none";
  downloadBtn.href = "#";
  downloadBtn.target = "_blank";
  
  leftBtns.appendChild(checkBtn);
  leftBtns.appendChild(downloadBtn);
  
  const copyBtn = document.createElement('button');
  copyBtn.type = "button";
  copyBtn.className = "copy-btn bg-gray-100 dark:bg-gray-700 text-gray-400 dark:text-gray-500 text-xs font-medium px-3 py-1.5 rounded-lg transition flex items-center gap-1 cursor-not-allowed";
  copyBtn.innerHTML = '<i class="far fa-copy"></i> 复制地址';
  copyBtn.disabled = true;
  
  actionBar.appendChild(leftBtns);
  actionBar.appendChild(copyBtn);
  
  const infoMsg = document.createElement('div');
  infoMsg.className = "text-xs text-gray-400 dark:text-gray-500 mt-2 flex items-center gap-1";
  infoMsg.innerHTML = '<i class="fas fa-info-circle"></i> 尚未触发任务';
  
  container.appendChild(header);
  container.appendChild(actionBar);
  container.appendChild(infoMsg);
  
  return { container, statusBadge, checkBtn, downloadBtn, copyBtn, infoMsg, imageName };
}

function updateTriggerStatus(imageName, success, message = '') {
  const record = statusRowsMap.get(imageName);
  if (!record) return;
  const { statusBadge, infoMsg, downloadBtn, copyBtn, checkBtn } = record;
  if (success) {
    statusBadge.innerText = "✅ 已触发";
    statusBadge.className = "status-badge text-xs bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-300 px-2 py-1 rounded-full";
    infoMsg.innerHTML = '<i class="fas fa-check-circle text-green-500"></i> 任务已提交，请稍后点击「检测文件」确认构建完成。';
    checkBtn.disabled = false;
    checkBtn.classList.remove('opacity-50', 'cursor-not-allowed');
  } else {
    statusBadge.innerText = "❌ 触发失败";
    statusBadge.className = "status-badge text-xs bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300 px-2 py-1 rounded-full";
    infoMsg.innerHTML = `<i class="fas fa-exclamation-triangle text-red-500"></i> 触发失败: ${escapeHtml(message)}`;
    checkBtn.disabled = true;
    downloadBtn.style.pointerEvents = "none";
    downloadBtn.classList.add('opacity-50');
    copyBtn.disabled = true;
  }
}

async function performCheck(imageName) {
  const record = statusRowsMap.get(imageName);
  if (!record) return;
  const { checkBtn, downloadBtn, copyBtn, infoMsg, statusBadge } = record;
  const originalUrl = getOriginalDownloadUrl(imageName);
  const originalHtml = checkBtn.innerHTML;
  checkBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 检测中';
  checkBtn.disabled = true;
  infoMsg.innerHTML = '<i class="fas fa-hourglass-half"></i> 正在检测 GitHub Release 文件...';
  
  try {
    const exists = await checkFileExists(originalUrl);
    if (exists) {
      const finalDownloadUrl = getAcceleratedDownloadUrl(imageName);
      downloadBtn.href = finalDownloadUrl;
      downloadBtn.style.pointerEvents = "auto";
      downloadBtn.classList.remove('bg-gray-100', 'dark:bg-gray-700', 'text-gray-400', 'cursor-not-allowed');
      downloadBtn.classList.add('bg-emerald-100', 'dark:bg-emerald-900/60', 'text-emerald-700', 'dark:text-emerald-300', 'hover:bg-emerald-200');
      downloadBtn.innerHTML = '<i class="fas fa-download"></i> 下载镜像';
      
      copyBtn.disabled = false;
      copyBtn.classList.remove('bg-gray-100', 'dark:bg-gray-700', 'text-gray-400', 'cursor-not-allowed');
      copyBtn.classList.add('bg-gray-100', 'dark:bg-gray-600', 'text-gray-700', 'dark:text-gray-200', 'hover:bg-emerald-50');
      copyBtn.onclick = () => { const url = getAcceleratedDownloadUrl(imageName); copyToClipboard(url, copyBtn); };
      
      infoMsg.innerHTML = `<i class="fas fa-check-circle text-green-600"></i> 文件已就绪！加速地址已生效`;
      statusBadge.innerText = "✅ 可下载";
      statusBadge.className = "status-badge text-xs bg-emerald-100 dark:bg-emerald-900/50 text-emerald-800 dark:text-emerald-200 px-2 py-1 rounded-full";
    } else {
      infoMsg.innerHTML = `<i class="fas fa-times-circle text-orange-500"></i> 文件尚未在 Releases 中找到，请等待 Worker 构建完成。`;
      statusBadge.innerText = "⏳ 等待构建";
      statusBadge.className = "status-badge text-xs bg-yellow-100 dark:bg-yellow-900/40 text-yellow-700 dark:text-yellow-300 px-2 py-1 rounded-full";
      downloadBtn.style.pointerEvents = "none";
      downloadBtn.classList.remove('bg-emerald-100');
      downloadBtn.classList.add('bg-gray-100', 'dark:bg-gray-700', 'text-gray-400');
      copyBtn.disabled = true;
    }
  } catch (err) {
    infoMsg.innerHTML = `<i class="fas fa-bug text-red-500"></i> 检测异常: ${err.message}`;
  } finally {
    checkBtn.innerHTML = '<i class="fas fa-search"></i> 检测文件';
    checkBtn.disabled = false;
    checkBtn.onclick = () => performCheck(imageName);
  }
}

async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check-circle"></i> 已复制';
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  } catch { alert('复制失败，可手动复制'); }
}

async function triggerImage(image, apiKey) {
  const record = statusRowsMap.get(image);
  if (!record) return;
  const { statusBadge, infoMsg, checkBtn } = record;
  statusBadge.innerText = "⏳ 触发中...";
  statusBadge.className = "status-badge text-xs bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-300 px-2 py-1 rounded-full";
  infoMsg.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 正在请求 Worker ...';
  checkBtn.disabled = true;
  try {
    const res = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image, key: apiKey }) });
    let data; try { data = await res.json(); } catch(e){ data = { success: false, message: await res.text() }; }
    if (data?.success) {
      updateTriggerStatus(image, true);
      setTimeout(() => { if(statusRowsMap.has(image)) performCheck(image); }, 2000);
    } else { updateTriggerStatus(image, false, data?.message || 'Worker失败'); }
  } catch(err) { updateTriggerStatus(image, false, err.message); }
}

resetMirrorBtn.onclick = () => { mirrorPrefixInput.value = 'https://ghfast.top'; refreshAllDownloadUrls(); };
clearMirrorBtn.onclick = () => { mirrorPrefixInput.value = ''; refreshAllDownloadUrls(); };
function refreshAllDownloadUrls() {
  for (let [img, rec] of statusRowsMap.entries()) {
    if (rec.downloadBtn && rec.downloadBtn.href && rec.downloadBtn.style.pointerEvents !== 'none') {
      rec.downloadBtn.href = getAcceleratedDownloadUrl(img);
    }
  }
}
mirrorPrefixInput.addEventListener('input', refreshAllDownloadUrls);

clearAllStatusBtn.onclick = () => {
  if (statusRowsMap.size > 0 && confirm('清空所有任务记录？')) { statusRowsMap.clear(); renderEmptyPanel(); updateTaskCounter(); }
};

form.onsubmit = async (e) => {
  e.preventDefault();
  const raw = imageListTextarea.value.trim();
  if(!raw) return alert('请输入镜像');
  const images = raw.split('\n').map(s=>s.trim()).filter(s=>s);
  const key = apiKeyInput.value.trim();
  if(!key) return alert('授权码不能为空');
  if(statusPanel.querySelector('.flex.flex-col.items-center.justify-center.py-10')) statusPanel.innerHTML = '';
  for(const img of images) {
    if(!statusRowsMap.has(img)) {
      const task = createTaskRow(img);
      statusPanel.appendChild(task.container);
      statusRowsMap.set(img, { ...task, checkBtn: task.checkBtn, downloadBtn: task.downloadBtn, copyBtn: task.copyBtn, statusBadge: task.statusBadge, infoMsg: task.infoMsg });
      task.checkBtn.onclick = () => performCheck(img);
    }
    await triggerImage(img, key);
  }
  updateTaskCounter();
  if(statusPanel.lastElementChild) statusPanel.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
};

function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
updateTaskCounter();
</script>
</body>
</html>
