<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Docker 镜像批量下载器 | 批量触发 | GitHub API 检测</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  
  /* 全局过渡 */
  body, .glass-card, .task-item, button, a, input, textarea, .status-badge, .check-btn, .download-btn, .copy-btn, .panel-header {
    transition: all 0.2s ease;
  }
  
  /* ========= 浅色模式（默认，清新优雅） ========= */
  body {
    background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
    background-attachment: fixed;
  }
  
  .glass-card {
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
  }
  
  .task-item {
    border-left: 3px solid #10b981;
    background: white;
    border-radius: 0.75rem;
    border: 1px solid #e5e7eb;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    padding: 0.75rem;
  }
  .task-item:hover {
    background-color: #f9fafb;
    transform: translateX(2px);
  }
  
  .scrollbar-custom::-webkit-scrollbar { width: 6px; }
  .scrollbar-custom::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 8px; }
  .scrollbar-custom::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
  
  /* 浅色模式面板头部 */
  .panel-header {
    background: rgba(255, 255, 255, 0.5);
    border-bottom: 1px solid #e5e7eb;
  }
  
  /* 浅色模式文字颜色 */
  .light-text-primary { color: #1f2937; }
  .light-text-secondary { color: #374151; }
  .light-text-muted { color: #6b7280; }
  .light-text-light { color: #9ca3af; }
  .light-border { border-color: #e5e7eb; }
  .light-bg-gray { background-color: #f3f4f6; }
  .light-bg-gray-hover:hover { background-color: #e5e7eb; }
  .light-badge-gray { background-color: #f3f4f6; color: #4b5563; }
  .light-badge-green { background-color: #d1fae5; color: #047857; }
  .light-badge-red { background-color: #fee2e2; color: #b91c1c; }
  .light-badge-amber { background-color: #fef3c7; color: #b45309; }
  .light-badge-emerald { background-color: #d1fae5; color: #047857; }
  .light-btn-indigo { background-color: #eef2ff; color: #4338ca; }
  .light-btn-indigo:hover { background-color: #e0e7ff; }
  .light-btn-download { background-color: #d1fae5; color: #047857; }
  .light-btn-download:hover { background-color: #a7f3d0; }
  .light-btn-copy { background-color: #f3f4f6; color: #374151; }
  .light-btn-copy:hover { background-color: #e5e7eb; }
  
  /* ========= 深色模式（独立配色） ========= */
  body.dark {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    background-attachment: fixed;
  }
  
  body.dark .glass-card {
    background: rgba(30, 41, 59, 0.96);
    border: 1px solid rgba(71, 85, 105, 0.5);
    box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.3);
  }
  
  body.dark .task-item {
    background-color: #1e293b;
    border-color: #334155;
    border-left-color: #34d399;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  body.dark .task-item:hover {
    background-color: #2d3a4e;
    transform: translateX(2px);
  }
  
  body.dark input, body.dark textarea {
    background-color: #0f172a;
    border-color: #475569;
    color: #e2e8f0;
  }
  body.dark input:focus, body.dark textarea:focus {
    border-color: #10b981;
    outline: none;
  }
  
  body.dark .scrollbar-custom::-webkit-scrollbar-track { background: #1e293b; }
  body.dark .scrollbar-custom::-webkit-scrollbar-thumb { background: #475569; }
  
  /* 深色模式面板头部 - 独立配色 */
  body.dark .panel-header {
    background: rgba(30, 41, 59, 0.8);
    border-bottom: 1px solid #334155;
  }
  
  /* 深色模式文字颜色 */
  body.dark .dark-text-primary { color: #f1f5f9; }
  body.dark .dark-text-secondary { color: #e2e8f0; }
  body.dark .dark-text-muted { color: #94a3b8; }
  body.dark .dark-text-light { color: #64748b; }
  body.dark .dark-border { border-color: #334155; }
  body.dark .dark-bg-gray { background-color: #334155; }
  body.dark .dark-bg-gray-hover:hover { background-color: #475569; }
  body.dark .dark-badge-gray { background-color: #334155; color: #cbd5e1; }
  body.dark .dark-badge-green { background-color: #065f46; color: #6ee7b7; }
  body.dark .dark-badge-red { background-color: #7f1d1d; color: #fca5a5; }
  body.dark .dark-badge-amber { background-color: #78350f; color: #fcd34d; }
  body.dark .dark-badge-emerald { background-color: #065f46; color: #6ee7b7; }
  body.dark .dark-btn-indigo { background-color: #312e81; color: #a5b4fc; }
  body.dark .dark-btn-indigo:hover { background-color: #4338ca; }
  body.dark .dark-btn-download { background-color: #065f46; color: #6ee7b7; }
  body.dark .dark-btn-download:hover { background-color: #047857; }
  body.dark .dark-btn-copy { background-color: #334155; color: #cbd5e1; }
  body.dark .dark-btn-copy:hover { background-color: #475569; }
  
  /* 主题切换按钮 */
  .theme-toggle-btn {
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
    padding: 0.75rem;
    border-radius: 9999px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }
  .theme-toggle-btn:hover { transform: scale(1.05); }
  
  body .theme-toggle-btn {
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(203, 213, 225, 0.6);
    color: #334155;
  }
  body.dark .theme-toggle-btn {
    background: rgba(30, 41, 59, 0.9);
    border: 1px solid #475569;
    color: #f1f5f9;
  }
  body.dark .theme-toggle-btn:hover { background: #334155; }
  
  .btn-hover-scale:active { transform: scale(0.97); }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-5 relative">

<!-- 主题切换按钮 -->
<div class="fixed top-5 right-5 z-50">
  <button id="themeToggle" class="theme-toggle-btn">
    <i id="themeIcon" class="fas fa-moon text-xl"></i>
  </button>
</div>

<div class="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-2 gap-7">

  <!-- 左侧表单 -->
  <div class="glass-card rounded-2xl shadow-xl p-7 flex flex-col gap-6">
    <div class="text-center space-y-2">
      <div class="inline-flex items-center justify-center bg-gradient-to-br from-emerald-500 to-teal-600 p-2.5 rounded-2xl shadow-md">
        <i class="fab fa-docker text-3xl text-white"></i>
      </div>
      <h1 class="text-3xl font-bold tracking-tight light-text-primary dark-text-primary">批量镜像下载器</h1>
      <p class="text-sm light-text-muted dark-text-muted">批量触发 GitHub Actions · 一次构建所有镜像 · 支持 GitHub 加速</p>
    </div>

    <form id="dockerForm" class="flex flex-col gap-5">
      <div>
        <label class="block font-semibold mb-1.5 flex items-center gap-2 light-text-secondary dark-text-secondary">
          <i class="fas fa-list-ul text-emerald-600 text-sm"></i>
          <span>镜像名称 (每行一个)</span>
          <span class="text-xs text-red-400 ml-1">*</span>
        </label>
        <textarea id="imageList" placeholder="例如:&#10;nginx:latest&#10;linuxserver/obsidian:latest&#10;mysql:8.0&#10;redis:7-alpine"
          class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 transition font-mono text-sm"
          rows="8" required></textarea>
        <p class="text-xs mt-1 light-text-light dark-text-light"><i class="fas fa-info-circle"></i> 支持格式: 镜像名[:tag] , 多个镜像将一次性批量构建</p>
      </div>

      <div>
        <label class="block font-semibold mb-1.5 flex items-center gap-2 light-text-secondary dark-text-secondary">
          <i class="fas fa-key text-amber-600 text-sm"></i>
          <span>授权码</span>
          <span class="text-xs text-red-400 ml-1">*</span>
        </label>
        <div class="relative">
          <input type="password" id="apiKey" placeholder="请输入授权码"
            class="w-full border rounded-xl px-4 py-3 pr-10 focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 transition"
            required>
          <i class="fas fa-lock absolute right-4 top-1/2 -translate-y-1/2 light-text-light dark-text-light text-sm"></i>
        </div>
      </div>

      <div>
        <label class="block font-semibold mb-1.5 flex items-center gap-2 light-text-secondary dark-text-secondary">
          <i class="fas fa-tachometer-alt text-blue-500 text-sm"></i>
          <span>GitHub 加速地址</span>
          <span class="text-xs light-text-light dark-text-light">用于拼接下载链接</span>
        </label>
        <div class="flex items-center gap-2">
          <div class="relative flex-1">
            <input type="text" id="mirrorPrefix" value="https://ghfast.top" placeholder="例如: https://ghfast.top"
              class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-400 transition">
            <i class="fas fa-globe absolute right-4 top-1/2 -translate-y-1/2 light-text-light dark-text-light text-sm"></i>
          </div>
          <button type="button" id="resetMirror" class="px-3 py-2 rounded-xl transition text-sm font-medium light-bg-gray dark-bg-gray light-text-secondary dark-text-secondary light-bg-gray-hover dark-bg-gray-hover">
            <i class="fas fa-undo-alt"></i>
          </button>
          <button type="button" id="clearMirror" class="px-3 py-2 rounded-xl transition light-bg-gray dark-bg-gray light-text-secondary dark-text-secondary light-bg-gray-hover dark-bg-gray-hover">
            <i class="fas fa-times-circle"></i>
          </button>
        </div>
        <p class="text-xs mt-1 light-text-light dark-text-light"><i class="fas fa-link"></i> 最终下载地址 = 加速地址 + 原始GitHub地址</p>
      </div>

      <button type="submit" id="submitBtn" class="mt-2 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 btn-hover-scale">
        <i class="fas fa-cloud-download-alt"></i>
        <span>批量触发下载任务</span>
      </button>
    </form>

    <div class="border-t pt-3 text-center text-xs light-border dark-border light-text-light dark-text-light">
      <i class="far fa-clock"></i> 触发后 GitHub Actions 会批量构建所有镜像，请耐心等待
    </div>
  </div>

  <!-- 右侧状态面板 -->
  <div class="glass-card rounded-2xl shadow-xl flex flex-col h-full overflow-hidden">
    <div class="panel-header p-5">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <h2 class="text-xl font-bold flex items-center gap-2 light-text-secondary dark-text-secondary">
          <i class="fas fa-tasks text-emerald-600"></i>
          <span>镜像任务状态</span>
        </h2>
        <div class="flex gap-2">
          <button id="clearAllStatus" class="text-xs transition flex items-center gap-1 px-3 py-1.5 rounded-full light-bg-gray dark-bg-gray light-text-muted dark-text-muted light-bg-gray-hover dark-bg-gray-hover">
            <i class="fas fa-trash-alt"></i> 清空记录
          </button>
          <button id="checkAllBtn" class="text-xs transition flex items-center gap-1 px-3 py-1.5 rounded-full light-btn-indigo dark-btn-indigo">
            <i class="fas fa-search"></i> 全部检测
          </button>
          <span id="taskCounter" class="text-xs px-2.5 py-1 rounded-full font-medium light-bg-gray dark-bg-gray light-text-secondary dark-text-secondary">0个任务</span>
        </div>
      </div>
    </div>
    <div id="statusPanel" class="flex-1 p-4 space-y-3 overflow-y-auto max-h-[60vh] md:max-h-[65vh] scrollbar-custom">
      <div class="flex flex-col items-center justify-center py-10 light-text-light dark-text-light">
        <i class="fas fa-inbox text-5xl mb-3 opacity-40"></i>
        <p class="text-sm">暂无镜像任务</p>
        <p class="text-xs mt-1">输入镜像并点击批量触发</p>
      </div>
    </div>
  </div>
</div>

<script>
// ======================== 主题切换 ========================
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const getPreferredTheme = () => {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') return saved;
  return 'light';
};
let currentTheme = getPreferredTheme();

function applyTheme(theme) {
  if (theme === 'dark') {
    document.body.classList.add('dark');
    themeIcon.className = 'fas fa-sun text-xl';
  } else {
    document.body.classList.remove('dark');
    themeIcon.className = 'fas fa-moon text-xl';
  }
  localStorage.setItem('theme', theme);
}
applyTheme(currentTheme);

themeToggle.addEventListener('click', () => {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme(currentTheme);
});

// ======================== 核心配置 ========================
const WORKER_URL = 'https://download-docker-images.jianghangte.workers.dev';
const BATCH_RELEASE_TAG = 'docker-images-batch';
const GITHUB_API_RELEASES = `https://api.github.com/repos/jianghuaangte/download-docker-images/releases/tags/${BATCH_RELEASE_TAG}`;
const RELEASE_BASE_URL = `https://github.com/jianghuaangte/download-docker-images/releases/download/${BATCH_RELEASE_TAG}/`;

const form = document.getElementById('dockerForm');
const imageListTextarea = document.getElementById('imageList');
const apiKeyInput = document.getElementById('apiKey');
const mirrorPrefixInput = document.getElementById('mirrorPrefix');
const resetMirrorBtn = document.getElementById('resetMirror');
const clearMirrorBtn = document.getElementById('clearMirror');
const statusPanel = document.getElementById('statusPanel');
const clearAllStatusBtn = document.getElementById('clearAllStatus');
const checkAllBtn = document.getElementById('checkAllBtn');
const taskCounterSpan = document.getElementById('taskCounter');

let statusRowsMap = new Map();

function getTarFileName(image) {
  return image.replace(/[\/:]/g, '_') + '.tar';
}

function getOriginalDownloadUrl(image) {
  return RELEASE_BASE_URL + getTarFileName(image);
}

function getAcceleratedDownloadUrl(image) {
  const originalUrl = getOriginalDownloadUrl(image);
  let mirror = mirrorPrefixInput.value.trim();
  if (!mirror) return originalUrl;
  mirror = mirror.replace(/\/+$/, '');
  return `${mirror}/${originalUrl}`;
}

// 使用 GitHub API 检测指定 release 下是否存在该文件
async function checkFileExistsViaAPI(imageName) {
  const fileName = getTarFileName(imageName);

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);

    const response = await fetch(GITHUB_API_RELEASES, {
      method: 'GET',
      headers: {
        'Accept': 'application/vnd.github+json'
      },
      signal: controller.signal,
      cache: 'no-store'
    });

    clearTimeout(timeoutId);

    if (!response.ok) {
      console.error('GitHub API error:', response.status);
      return false;
    }

    const release = await response.json();

    if (!release.assets || !Array.isArray(release.assets)) {
      return false;
    }

    return release.assets.some(asset => asset.name === fileName);
  } catch (err) {
    console.error('checkFileExistsViaAPI error:', err);
    return false;
  }
}

function updateTaskCounter() {
  taskCounterSpan.innerText = `${statusRowsMap.size}个任务`;
  if (statusRowsMap.size === 0 && statusPanel.children.length > 0) {
    const hasRealTask = Array.from(statusPanel.children).some(child => child.classList && child.classList.contains('task-item'));
    if (!hasRealTask) renderEmptyPanel();
  }
}

function renderEmptyPanel() {
  statusPanel.innerHTML = '';
  const emptyDiv = document.createElement('div');
  emptyDiv.className = "flex flex-col items-center justify-center py-10 light-text-light dark-text-light";
  emptyDiv.innerHTML = '<i class="fas fa-inbox text-5xl mb-3 opacity-40"></i><p class="text-sm">暂无镜像任务</p><p class="text-xs mt-1">输入镜像并点击批量触发</p>';
  statusPanel.appendChild(emptyDiv);
}

function createTaskRow(imageName) {
  const container = document.createElement('div');
  container.className = "task-item";
  
  const header = document.createElement('div');
  header.className = "flex items-center justify-between gap-2 flex-wrap mb-2";
  const imageTitle = document.createElement('div');
  imageTitle.className = "flex items-center gap-2 flex-1 min-w-0";
  imageTitle.innerHTML = `<i class="fab fa-docker text-emerald-500 text-sm flex-shrink-0"></i><span class="font-mono text-sm font-semibold truncate light-text-primary dark-text-primary" title="${escapeHtml(imageName)}">${escapeHtml(imageName)}</span>`;
  
  const statusBadge = document.createElement('span');
  statusBadge.className = "status-badge text-xs px-2 py-1 rounded-full whitespace-nowrap light-badge-gray dark-badge-gray";
  statusBadge.innerText = "⏳ 等待触发";
  header.appendChild(imageTitle);
  header.appendChild(statusBadge);
  
  const actionBar = document.createElement('div');
  actionBar.className = "flex items-center justify-between gap-2 mt-2 flex-wrap";
  const leftBtns = document.createElement('div');
  leftBtns.className = "flex gap-2";
  
  const checkBtn = document.createElement('button');
  checkBtn.type = "button";
  checkBtn.className = "check-btn text-xs font-medium px-3 py-1.5 rounded-lg transition flex items-center gap-1 light-btn-indigo dark-btn-indigo";
  checkBtn.innerHTML = '<i class="fas fa-search"></i> 检测文件';
  
  const downloadBtn = document.createElement('a');
  downloadBtn.className = "download-btn text-xs font-medium px-3 py-1.5 rounded-lg transition flex items-center gap-1 cursor-not-allowed light-bg-gray dark-bg-gray light-text-light dark-text-light";
  downloadBtn.innerHTML = '<i class="fas fa-download"></i> 下载';
  downloadBtn.style.pointerEvents = "none";
  downloadBtn.href = "#";
  downloadBtn.target = "_blank";
  
  leftBtns.appendChild(checkBtn);
  leftBtns.appendChild(downloadBtn);
  
  const copyBtn = document.createElement('button');
  copyBtn.type = "button";
  copyBtn.className = "copy-btn text-xs font-medium px-3 py-1.5 rounded-lg transition flex items-center gap-1 cursor-not-allowed light-bg-gray dark-bg-gray light-text-light dark-text-light";
  copyBtn.innerHTML = '<i class="far fa-copy"></i> 复制地址';
  copyBtn.disabled = true;
  
  actionBar.appendChild(leftBtns);
  actionBar.appendChild(copyBtn);
  
  const infoMsg = document.createElement('div');
  infoMsg.className = "text-xs mt-2 flex items-center gap-1 light-text-light dark-text-light";
  infoMsg.innerHTML = '<i class="fas fa-info-circle"></i> 尚未触发任务';
  
  container.appendChild(header);
  container.appendChild(actionBar);
  container.appendChild(infoMsg);
  
  return { container, statusBadge, checkBtn, downloadBtn, copyBtn, infoMsg, imageName };
}

function updateTriggerStatus(imageName, success, message = '') {
  const record = statusRowsMap.get(imageName);
  if (!record) return;
  const { statusBadge, infoMsg, downloadBtn, copyBtn, checkBtn } = record;
  if (success) {
    statusBadge.innerText = "✅ 已触发";
    statusBadge.className = "status-badge text-xs px-2 py-1 rounded-full whitespace-nowrap light-badge-green dark-badge-green";
    infoMsg.innerHTML = '<i class="fas fa-check-circle text-green-500"></i> 已加入批量构建队列，等待 Actions 执行';
    infoMsg.className = "text-xs mt-2 flex items-center gap-1 light-text-muted dark-text-muted";
    checkBtn.disabled = false;
  } else {
    statusBadge.innerText = "❌ 触发失败";
    statusBadge.className = "status-badge text-xs px-2 py-1 rounded-full whitespace-nowrap light-badge-red dark-badge-red";
    infoMsg.innerHTML = `<i class="fas fa-exclamation-triangle text-red-500"></i> 触发失败: ${escapeHtml(message)}`;
    infoMsg.className = "text-xs mt-2 flex items-center gap-1 light-text-muted dark-text-muted";
    checkBtn.disabled = true;
    downloadBtn.style.pointerEvents = "none";
    copyBtn.disabled = true;
  }
}

async function performCheck(imageName) {
  const record = statusRowsMap.get(imageName);
  if (!record) return;
  const { checkBtn, downloadBtn, copyBtn, infoMsg, statusBadge } = record;
  checkBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 检测中';
  checkBtn.disabled = true;
  infoMsg.innerHTML = '<i class="fas fa-hourglass-half"></i> 正在通过 GitHub API 检测 release 文件...';
  
  try {
    const exists = await checkFileExistsViaAPI(imageName);
    
    if (exists) {
      const finalDownloadUrl = getAcceleratedDownloadUrl(imageName);
      downloadBtn.href = finalDownloadUrl;
      downloadBtn.style.pointerEvents = "auto";
      downloadBtn.className = "download-btn text-xs font-medium px-3 py-1.5 rounded-lg transition flex items-center gap-1 light-btn-download dark-btn-download";
      downloadBtn.innerHTML = '<i class="fas fa-download"></i> 下载镜像';
      
      copyBtn.disabled = false;
      copyBtn.className = "copy-btn text-xs font-medium px-3 py-1.5 rounded-lg transition flex items-center gap-1 light-btn-copy dark-btn-copy";
      copyBtn.onclick = (e) => {
        e.preventDefault();
        const urlToCopy = getAcceleratedDownloadUrl(imageName);
        copyToClipboard(urlToCopy, copyBtn);
      };
      
      infoMsg.innerHTML = `<i class="fas fa-check-circle text-green-600"></i> 文件已就绪！可以下载了。`;
      infoMsg.className = "text-xs mt-2 flex items-center gap-1 light-text-muted dark-text-muted";
      statusBadge.innerText = "✅ 可下载";
      statusBadge.className = "status-badge text-xs px-2 py-1 rounded-full whitespace-nowrap light-badge-emerald dark-badge-emerald";
    } else {
      infoMsg.innerHTML = `<i class="fas fa-clock text-amber-500"></i> 文件尚未在 Releases 中找到，请等待 GitHub Actions 执行完成（通常需要5-10分钟）。`;
      infoMsg.className = "text-xs mt-2 flex items-center gap-1 light-text-muted dark-text-muted";
      statusBadge.innerText = "⏳ 构建中";
      statusBadge.className = "status-badge text-xs px-2 py-1 rounded-full whitespace-nowrap light-badge-amber dark-badge-amber";
      downloadBtn.style.pointerEvents = "none";
      downloadBtn.className = "download-btn text-xs font-medium px-3 py-1.5 rounded-lg transition flex items-center gap-1 cursor-not-allowed light-bg-gray dark-bg-gray light-text-light dark-text-light";
      copyBtn.disabled = true;
      copyBtn.className = "copy-btn text-xs font-medium px-3 py-1.5 rounded-lg transition flex items-center gap-1 cursor-not-allowed light-bg-gray dark-bg-gray light-text-light dark-text-light";
    }
  } catch (err) {
    infoMsg.innerHTML = `<i class="fas fa-bug text-red-500"></i> 检测异常: ${err.message}`;
  } finally {
    checkBtn.innerHTML = '<i class="fas fa-search"></i> 检测文件';
    checkBtn.disabled = false;
    checkBtn.onclick = () => performCheck(imageName);
  }
}

async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check-circle"></i> 已复制';
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  } catch (err) {
    alert('手动复制: ' + text);
  }
}

// 批量触发所有镜像
async function triggerBatchImages(images, apiKey) {
  // 创建所有任务行
  for (const img of images) {
    if (!statusRowsMap.has(img)) {
      const task = createTaskRow(img);
      statusPanel.appendChild(task.container);
      statusRowsMap.set(img, { 
        ...task, 
        checkBtn: task.checkBtn, 
        downloadBtn: task.downloadBtn, 
        copyBtn: task.copyBtn, 
        statusBadge: task.statusBadge, 
        infoMsg: task.infoMsg 
      });
      task.checkBtn.onclick = () => performCheck(img);
    }
    // 设置为排队等待状态
    const record = statusRowsMap.get(img);
    record.statusBadge.innerText = "⏳ 排队中";
    record.statusBadge.className = "status-badge text-xs px-2 py-1 rounded-full whitespace-nowrap light-badge-amber dark-badge-amber";
    record.infoMsg.innerHTML = '<i class="fas fa-hourglass-half"></i> 等待批量触发...';
  }
  
  updateTaskCounter();
  
  // 发送批量请求
  const submitBtn = document.getElementById('submitBtn');
  const originalBtnText = submitBtn.innerHTML;
  submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 触发中...';
  submitBtn.disabled = true;
  
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000);
    
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        images: images,  // 发送镜像数组
        key: apiKey 
      }),
      signal: controller.signal
    });
    
    clearTimeout(timeoutId);
    const result = await response.json();
    
    if (result.success) {
      for (const img of images) {
        updateTriggerStatus(img, true, '批量触发成功');
        // 延迟5秒后自动检测一次
        setTimeout(() => {
          if (statusRowsMap.has(img)) performCheck(img);
        }, 5000);
      }
    } else {
      for (const img of images) {
        updateTriggerStatus(img, false, result.message || '批量触发失败');
      }
      alert(`批量触发失败: ${result.message}`);
    }
  } catch (err) {
    if (err.name === 'AbortError') {
      for (const img of images) {
        updateTriggerStatus(img, false, '请求超时，请检查网络后重试');
      }
    } else {
      for (const img of images) {
        updateTriggerStatus(img, false, err.message);
      }
    }
  } finally {
    submitBtn.innerHTML = originalBtnText;
    submitBtn.disabled = false;
  }
}

function refreshAllDownloadUrls() {
  for (let [img, rec] of statusRowsMap.entries()) {
    if (rec.downloadBtn && rec.downloadBtn.href && rec.downloadBtn.style.pointerEvents !== 'none') {
      rec.downloadBtn.href = getAcceleratedDownloadUrl(img);
    }
  }
}

mirrorPrefixInput.addEventListener('input', refreshAllDownloadUrls);
resetMirrorBtn.onclick = () => { mirrorPrefixInput.value = 'https://ghfast.top'; refreshAllDownloadUrls(); };
clearMirrorBtn.onclick = () => { mirrorPrefixInput.value = ''; refreshAllDownloadUrls(); };

clearAllStatusBtn.onclick = () => {
  if (statusRowsMap.size > 0 && confirm('清空所有任务记录？不会影响已在后台构建的任务。')) {
    statusRowsMap.clear();
    renderEmptyPanel();
    updateTaskCounter();
  }
};

// 全部检测按钮
checkAllBtn.onclick = async () => {
  if (statusRowsMap.size === 0) {
    alert('没有任务可检测');
    return;
  }
  const originalText = checkAllBtn.innerHTML;
  checkAllBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 批量检测中';
  checkAllBtn.disabled = true;
  
  for (let [img, record] of statusRowsMap.entries()) {
    if (record.statusBadge.innerText !== '❌ 触发失败') {
      await performCheck(img);
      await new Promise(resolve => setTimeout(resolve, 500)); // 延迟避免API限流
    }
  }
  
  checkAllBtn.innerHTML = originalText;
  checkAllBtn.disabled = false;
};

form.onsubmit = async (e) => {
  e.preventDefault();
  const rawImages = imageListTextarea.value.trim();
  if (!rawImages) return alert('请输入至少一个镜像');
  const images = rawImages.split('\n').map(s => s.trim()).filter(s => s);
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) return alert('授权码不能为空');
  
  if (images.length > 20) {
    if (!confirm(`您输入了 ${images.length} 个镜像，批量构建可能需要较长时间，是否继续？`)) {
      return;
    }
  }
  
  // 清空空状态提示
  if (statusPanel.querySelector('.flex.flex-col.items-center.justify-center.py-10')) {
    statusPanel.innerHTML = '';
  }
  
  // 批量触发所有镜像（只发送一次请求）
  await triggerBatchImages(images, apiKey);
  
  updateTaskCounter();
  if (statusPanel.lastElementChild) {
    statusPanel.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
};

function escapeHtml(str) {
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

updateTaskCounter();
</script>
