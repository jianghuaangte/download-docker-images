<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Docker 镜像批量下载器 | 支持大文件分割</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  
  body, .glass-card, .task-item, button, a, input, textarea, .status-badge {
    transition: all 0.2s ease;
  }
  
  body {
    background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
    background-attachment: fixed;
  }
  
  .glass-card {
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
  }
  
  .task-item {
    border-left: 3px solid #10b981;
    background: white;
    border-radius: 0.75rem;
    border: 1px solid #e5e7eb;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    padding: 0.75rem;
  }
  .task-item:hover {
    background-color: #f9fafb;
    transform: translateX(2px);
  }
  
  .scrollbar-custom::-webkit-scrollbar { width: 6px; }
  .scrollbar-custom::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 8px; }
  .scrollbar-custom::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
  
  .panel-header {
    background: rgba(255, 255, 255, 0.5);
    border-bottom: 1px solid #e5e7eb;
  }
  
  .light-text-primary { color: #1f2937; }
  .light-text-secondary { color: #374151; }
  .light-text-muted { color: #6b7280; }
  .light-text-light { color: #9ca3af; }
  .light-border { border-color: #e5e7eb; }
  .light-bg-gray { background-color: #f3f4f6; }
  .light-bg-gray-hover:hover { background-color: #e5e7eb; }
  .light-badge-gray { background-color: #f3f4f6; color: #4b5563; }
  .light-badge-green { background-color: #d1fae5; color: #047857; }
  .light-badge-red { background-color: #fee2e2; color: #b91c1c; }
  .light-badge-amber { background-color: #fef3c7; color: #b45309; }
  .light-badge-emerald { background-color: #d1fae5; color: #047857; }
  .light-btn-indigo { background-color: #eef2ff; color: #4338ca; }
  .light-btn-indigo:hover { background-color: #e0e7ff; }
  .light-btn-download { background-color: #d1fae5; color: #047857; }
  .light-btn-download:hover { background-color: #a7f3d0; }
  .light-btn-copy { background-color: #f3f4f6; color: #374151; }
  .light-btn-copy:hover { background-color: #e5e7eb; }
  
  body.dark {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    background-attachment: fixed;
  }
  
  body.dark .glass-card {
    background: rgba(30, 41, 59, 0.96);
    border: 1px solid rgba(71, 85, 105, 0.5);
    box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.3);
  }
  
  body.dark .task-item {
    background-color: #1e293b;
    border-color: #334155;
    border-left-color: #34d399;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  body.dark .task-item:hover {
    background-color: #2d3a4e;
  }
  
  body.dark input, body.dark textarea {
    background-color: #0f172a;
    border-color: #475569;
    color: #e2e8f0;
  }
  body.dark input:focus, body.dark textarea:focus {
    border-color: #10b981;
    outline: none;
  }
  
  body.dark .scrollbar-custom::-webkit-scrollbar-track { background: #1e293b; }
  body.dark .scrollbar-custom::-webkit-scrollbar-thumb { background: #475569; }
  body.dark .panel-header {
    background: rgba(30, 41, 59, 0.8);
    border-bottom: 1px solid #334155;
  }
  
  body.dark .dark-text-primary { color: #f1f5f9; }
  body.dark .dark-text-secondary { color: #e2e8f0; }
  body.dark .dark-text-muted { color: #94a3b8; }
  body.dark .dark-text-light { color: #64748b; }
  body.dark .dark-border { border-color: #334155; }
  body.dark .dark-bg-gray { background-color: #334155; }
  body.dark .dark-bg-gray-hover:hover { background-color: #475569; }
  body.dark .dark-badge-gray { background-color: #334155; color: #cbd5e1; }
  body.dark .dark-badge-green { background-color: #065f46; color: #6ee7b7; }
  body.dark .dark-badge-red { background-color: #7f1d1d; color: #fca5a5; }
  body.dark .dark-badge-amber { background-color: #78350f; color: #fcd34d; }
  body.dark .dark-badge-emerald { background-color: #065f46; color: #6ee7b7; }
  body.dark .dark-btn-indigo { background-color: #312e81; color: #a5b4fc; }
  body.dark .dark-btn-indigo:hover { background-color: #4338ca; }
  body.dark .dark-btn-download { background-color: #065f46; color: #6ee7b7; }
  body.dark .dark-btn-download:hover { background-color: #047857; }
  body.dark .dark-btn-copy { background-color: #334155; color: #cbd5e1; }
  body.dark .dark-btn-copy:hover { background-color: #475569; }
  
  .theme-toggle-btn {
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
    padding: 0.75rem;
    border-radius: 9999px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }
  .theme-toggle-btn:hover { transform: scale(1.05); }
  
  body .theme-toggle-btn {
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(203, 213, 225, 0.6);
    color: #334155;
  }
  body.dark .theme-toggle-btn {
    background: rgba(30, 41, 59, 0.9);
    border: 1px solid #475569;
    color: #f1f5f9;
  }
  
  .btn-hover-scale:active { transform: scale(0.97); }
  .file-list { max-height: 200px; overflow-y: auto; }
  .file-item { font-size: 11px; padding: 4px 8px; margin: 2px 0; border-radius: 6px; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-5 relative">

<div class="fixed top-5 right-5 z-50">
  <button id="themeToggle" class="theme-toggle-btn">
    <i id="themeIcon" class="fas fa-moon text-xl"></i>
  </button>
</div>

<div class="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-2 gap-7">

  <div class="glass-card rounded-2xl shadow-xl p-7 flex flex-col gap-6">
    <div class="text-center space-y-2">
      <div class="inline-flex items-center justify-center bg-gradient-to-br from-emerald-500 to-teal-600 p-2.5 rounded-2xl shadow-md">
        <i class="fab fa-docker text-3xl text-white"></i>
      </div>
      <h1 class="text-3xl font-bold tracking-tight light-text-primary dark-text-primary">批量镜像下载器</h1>
      <p class="text-sm light-text-muted dark-text-muted">批量触发 · 自动分割大文件 · 智能检测下载</p>
    </div>

    <form id="dockerForm" class="flex flex-col gap-5">
      <div>
        <label class="block font-semibold mb-1.5 flex items-center gap-2 light-text-secondary dark-text-secondary">
          <i class="fas fa-list-ul text-emerald-600 text-sm"></i>
          <span>镜像名称 (每行一个)</span>
          <span class="text-xs text-red-400 ml-1">*</span>
        </label>
        <textarea id="imageList" placeholder="例如:&#10;nginx:latest&#10;linuxserver/obsidian:latest&#10;mysql:8.0"
          class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-400 transition font-mono text-sm"
          rows="8" required></textarea>
        <p class="text-xs mt-1 light-text-light dark-text-light"><i class="fas fa-info-circle"></i> 大镜像(>900MB)会自动分割成多个文件</p>
      </div>

      <div>
        <label class="block font-semibold mb-1.5 flex items-center gap-2 light-text-secondary dark-text-secondary">
          <i class="fas fa-key text-amber-600 text-sm"></i>
          <span>授权码</span>
          <span class="text-xs text-red-400 ml-1">*</span>
        </label>
        <div class="relative">
          <input type="password" id="apiKey" placeholder="请输入授权码" class="w-full border rounded-xl px-4 py-3 pr-10 focus:ring-2 focus:ring-emerald-400 transition" required>
          <i class="fas fa-lock absolute right-4 top-1/2 -translate-y-1/2 light-text-light dark-text-light text-sm"></i>
        </div>
      </div>

      <div>
        <label class="block font-semibold mb-1.5 flex items-center gap-2 light-text-secondary dark-text-secondary">
          <i class="fas fa-tachometer-alt text-blue-500 text-sm"></i>
          <span>GitHub 加速地址</span>
        </label>
        <div class="flex items-center gap-2">
          <div class="relative flex-1">
            <input type="text" id="mirrorPrefix" value="https://ghfast.top" class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-400 transition">
          </div>
          <button type="button" id="resetMirror" class="px-3 py-2 rounded-xl text-sm font-medium light-bg-gray dark-bg-gray light-text-secondary dark-text-secondary light-bg-gray-hover dark-bg-gray-hover">
            <i class="fas fa-undo-alt"></i>
          </button>
        </div>
      </div>

      <button type="submit" id="submitBtn" class="mt-2 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 btn-hover-scale">
        <i class="fas fa-cloud-download-alt"></i>
        <span>批量触发下载任务</span>
      </button>
    </form>
  </div>

  <div class="glass-card rounded-2xl shadow-xl flex flex-col h-full overflow-hidden">
    <div class="panel-header p-5">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <h2 class="text-xl font-bold flex items-center gap-2 light-text-secondary dark-text-secondary">
          <i class="fas fa-tasks text-emerald-600"></i>
          <span>镜像任务状态</span>
        </h2>
        <div class="flex gap-2">
          <button id="refreshReleaseBtn" class="text-xs transition flex items-center gap-1 px-3 py-1.5 rounded-full light-btn-indigo dark-btn-indigo">
            <i class="fas fa-sync-alt"></i> 刷新列表
          </button>
          <button id="clearAllStatus" class="text-xs transition flex items-center gap-1 px-3 py-1.5 rounded-full light-bg-gray dark-bg-gray light-text-muted dark-text-muted light-bg-gray-hover dark-bg-gray-hover">
            <i class="fas fa-trash-alt"></i> 清空
          </button>
        </div>
      </div>
    </div>
    <div id="statusPanel" class="flex-1 p-4 space-y-3 overflow-y-auto max-h-[60vh] scrollbar-custom">
      <div class="flex flex-col items-center justify-center py-10 light-text-light dark-text-light">
        <i class="fas fa-inbox text-5xl mb-3 opacity-40"></i>
        <p class="text-sm">暂无镜像任务</p>
        <p class="text-xs mt-1">输入镜像并点击批量触发</p>
      </div>
    </div>
  </div>
</div>

<script>
// 主题切换
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const getPreferredTheme = () => localStorage.getItem('theme') || 'light';
let currentTheme = getPreferredTheme();

function applyTheme(theme) {
  if (theme === 'dark') {
    document.body.classList.add('dark');
    themeIcon.className = 'fas fa-sun text-xl';
  } else {
    document.body.classList.remove('dark');
    themeIcon.className = 'fas fa-moon text-xl';
  }
  localStorage.setItem('theme', theme);
}
applyTheme(currentTheme);
themeToggle.addEventListener('click', () => {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme(currentTheme);
});

// 配置
const WORKER_URL = 'https://download-docker-images.jianghangte.workers.dev';
const GITHUB_REPO = 'jianghuaangte/download-docker-images';
const RELEASE_TAG = 'docker-images-batch';
const RELEASE_API_URL = `https://api.github.com/repos/${GITHUB_REPO}/releases/tags/${RELEASE_TAG}`;
const RELEASE_DOWNLOAD_URL = `https://github.com/${GITHUB_REPO}/releases/download/${RELEASE_TAG}`;

const form = document.getElementById('dockerForm');
const imageListTextarea = document.getElementById('imageList');
const apiKeyInput = document.getElementById('apiKey');
const mirrorPrefixInput = document.getElementById('mirrorPrefix');
const resetMirrorBtn = document.getElementById('resetMirror');
const statusPanel = document.getElementById('statusPanel');
const clearAllStatusBtn = document.getElementById('clearAllStatus');
const refreshReleaseBtn = document.getElementById('refreshReleaseBtn');

let statusRowsMap = new Map();
let releaseAssets = []; // 存储当前 Release 的所有文件

// 获取加速后的下载链接
function getAcceleratedUrl(path) {
  let mirror = mirrorPrefixInput.value.trim();
  if (!mirror) return `https://github.com/${GITHUB_REPO}/releases/download/${RELEASE_TAG}/${path}`;
  mirror = mirror.replace(/\/+$/, '');
  return `${mirror}/${RELEASE_DOWNLOAD_URL}/${path}`;
}

// 获取 Release 文件列表
async function fetchReleaseAssets() {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);
    const response = await fetch(RELEASE_API_URL, {
      headers: { 'Accept': 'application/vnd.github+json' },
      signal: controller.signal,
      cache: 'no-store'
    });
    clearTimeout(timeoutId);
    
    if (!response.ok) return [];
    const release = await response.json();
    releaseAssets = release.assets || [];
    return releaseAssets;
  } catch (err) {
    console.error('fetchReleaseAssets error:', err);
    return [];
  }
}

// 从文件列表中提取镜像名
function extractImageNameFromFile(filename) {
  // 匹配模式: 镜像名.tar.gz 或 镜像名.part.aa 等
  let name = filename.replace(/\.tar\.gz$/, '').replace(/\.part\..*$/, '');
  // 将下划线还原为斜杠和冒号
  name = name.replace(/_/g, '/').replace(/--/g, ':');
  // 处理可能的格式问题
  name = name.replace(/\//g, '/').replace(/:/g, ':');
  return name;
}

// 检查镜像是否完整（所有分片都存在或单文件存在）
function checkImageComplete(imageName) {
  const safePrefix = imageName.replace(/\//g, '_').replace(/:/g, '_');
  const relatedFiles = releaseAssets.filter(asset => {
    return asset.name.startsWith(safePrefix);
  });
  
  if (relatedFiles.length === 0) return { complete: false, files: [], size: 0 };
  
  // 检查是否有完整的 tar.gz 文件
  const hasCompleteFile = relatedFiles.some(f => f.name === `${safePrefix}.tar.gz`);
  if (hasCompleteFile) {
    const file = relatedFiles.find(f => f.name === `${safePrefix}.tar.gz`);
    return { complete: true, files: [file], size: file.size, isSplit: false };
  }
  
  // 检查是否有分片文件
  const partFiles = relatedFiles.filter(f => f.name.includes('.part.'));
  if (partFiles.length > 0) {
    const totalSize = partFiles.reduce((sum, f) => sum + f.size, 0);
    return { complete: true, files: partFiles, size: totalSize, isSplit: true };
  }
  
  return { complete: false, files: relatedFiles, size: 0, isSplit: false };
}

// 格式化文件大小
function formatSize(bytes) {
  if (!bytes) return '0 B';
  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(2) + ' ' + sizes[i];
}

// 创建任务行
function createTaskRow(imageName) {
  const container = document.createElement('div');
  container.className = "task-item";
  container.dataset.image = imageName;
  
  const header = document.createElement('div');
  header.className = "flex items-center justify-between gap-2 flex-wrap mb-2";
  header.innerHTML = `
    <div class="flex items-center gap-2 flex-1 min-w-0">
      <i class="fab fa-docker text-emerald-500 text-sm flex-shrink-0"></i>
      <span class="font-mono text-sm font-semibold truncate light-text-primary dark-text-primary" title="${escapeHtml(imageName)}">${escapeHtml(imageName)}</span>
    </div>
    <span class="status-badge text-xs px-2 py-1 rounded-full whitespace-nowrap light-badge-gray dark-badge-gray">⏳ 等待触发</span>
  `;
  
  const downloadSection = document.createElement('div');
  downloadSection.className = "mt-2";
  downloadSection.innerHTML = `
    <div class="file-list text-xs"></div>
    <div class="flex gap-2 mt-2">
      <button class="check-btn text-xs font-medium px-3 py-1.5 rounded-lg light-btn-indigo dark-btn-indigo"><i class="fas fa-search"></i> 检测文件</button>
      <button class="download-all-btn text-xs font-medium px-3 py-1.5 rounded-lg light-bg-gray dark-bg-gray light-text-muted dark-text-muted" disabled><i class="fas fa-download"></i> 下载全部</button>
    </div>
    <div class="info-msg text-xs mt-2 flex items-center gap-1 light-text-light dark-text-light"><i class="fas fa-info-circle"></i> 尚未触发任务</div>
  `;
  
  container.appendChild(header);
  container.appendChild(downloadSection);
  
  const statusBadge = header.querySelector('.status-badge');
  const checkBtn = downloadSection.querySelector('.check-btn');
  const downloadAllBtn = downloadSection.querySelector('.download-all-btn');
  const fileListDiv = downloadSection.querySelector('.file-list');
  const infoMsg = downloadSection.querySelector('.info-msg');
  
  return { container, statusBadge, checkBtn, downloadAllBtn, fileListDiv, infoMsg, imageName };
}

// 更新任务显示
async function updateTaskDisplay(imageName) {
  const record = statusRowsMap.get(imageName);
  if (!record) return;
  
  const { fileListDiv, downloadAllBtn, infoMsg, statusBadge } = record;
  
  const { complete, files, size, isSplit } = checkImageComplete(imageName);
  
  if (!complete || files.length === 0) {
    fileListDiv.innerHTML = '<div class="text-muted">暂无可用文件</div>';
    downloadAllBtn.disabled = true;
    downloadAllBtn.className = "download-all-btn text-xs font-medium px-3 py-1.5 rounded-lg light-bg-gray dark-bg-gray light-text-muted dark-text-muted";
    return;
  }
  
  // 显示文件列表
  let filesHtml = '';
  if (isSplit) {
    filesHtml = `<div class="mb-1 text-amber-600 dark:text-amber-400"><i class="fas fa-cut"></i> 镜像已分割为 ${files.length} 个分片:</div>`;
    files.forEach((file, idx) => {
      const downloadUrl = getAcceleratedUrl(file.name);
      filesHtml += `
        <div class="file-item flex items-center justify-between gap-2 light-bg-gray dark-bg-gray p-1 rounded">
          <span class="truncate">📦 分片 ${String(idx + 1).padStart(2, '0')}: ${file.name}</span>
          <span class="text-muted text-xs">${formatSize(file.size)}</span>
          <a href="${downloadUrl}" download class="text-emerald-600 hover:text-emerald-700" target="_blank"><i class="fas fa-download"></i></a>
        </div>
      `;
    });
    filesHtml += `<div class="mt-2 text-xs text-muted">⚠️ 下载所有分片后，使用以下命令合并: <code class="light-bg-gray dark-bg-gray px-1 rounded">cat ${files[0].name.replace(/\.part\..*/, '')}.part.* > image.tar</code></div>`;
  } else {
    const file = files[0];
    const downloadUrl = getAcceleratedUrl(file.name);
    filesHtml = `
      <div class="file-item flex items-center justify-between gap-2 light-bg-gray dark-bg-gray p-2 rounded">
        <span><i class="fas fa-file-archive"></i> ${file.name}</span>
        <span class="text-muted text-xs">${formatSize(file.size)}</span>
        <a href="${downloadUrl}" download class="text-emerald-600 hover:text-emerald-700" target="_blank"><i class="fas fa-download"></i></a>
      </div>
    `;
  }
  
  fileListDiv.innerHTML = filesHtml;
  
  // 启用下载全部按钮（下载所有分片）
  if (files.length > 0) {
    downloadAllBtn.disabled = false;
    downloadAllBtn.className = "download-all-btn text-xs font-medium px-3 py-1.5 rounded-lg light-btn-download dark-btn-download";
    downloadAllBtn.onclick = () => {
      files.forEach(file => {
        const url = getAcceleratedUrl(file.name);
        window.open(url, '_blank');
      });
    };
  }
  
  infoMsg.innerHTML = `<i class="fas fa-check-circle text-green-500"></i> 已就绪，共 ${files.length} 个文件，总计 ${formatSize(size)}`;
  statusBadge.innerText = "✅ 可下载";
  statusBadge.className = "status-badge text-xs px-2 py-1 rounded-full whitespace-nowrap light-badge-emerald dark-badge-emerald";
}

// 检测镜像
async function performCheck(imageName, forceRefresh = false) {
  const record = statusRowsMap.get(imageName);
  if (!record) return;
  
  const { checkBtn, infoMsg, statusBadge } = record;
  
  if (forceRefresh) {
    await fetchReleaseAssets();
  }
  
  checkBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 检测中';
  checkBtn.disabled = true;
  infoMsg.innerHTML = '<i class="fas fa-hourglass-half"></i> 正在检测文件...';
  
  try {
    await updateTaskDisplay(imageName);
    infoMsg.innerHTML = '<i class="fas fa-check-circle text-green-500"></i> 检测完成';
  } catch (err) {
    infoMsg.innerHTML = `<i class="fas fa-bug text-red-500"></i> 检测异常: ${err.message}`;
  } finally {
    checkBtn.innerHTML = '<i class="fas fa-search"></i> 检测文件';
    checkBtn.disabled = false;
  }
}

// 触发批量构建
async function triggerBatchImages(images, apiKey) {
  // 创建所有任务行
  for (const img of images) {
    if (!statusRowsMap.has(img)) {
      const task = createTaskRow(img);
      statusPanel.appendChild(task.container);
      statusRowsMap.set(img, task);
    }
    const record = statusRowsMap.get(img);
    record.statusBadge.innerText = "⏳ 触发中...";
    record.statusBadge.className = "status-badge text-xs px-2 py-1 rounded-full whitespace-nowrap light-badge-amber dark-badge-amber";
    record.infoMsg.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 正在触发 GitHub Actions...';
    record.checkBtn.onclick = () => performCheck(img, true);
  }
  
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 触发中...';
  submitBtn.disabled = true;
  
  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ images, key: apiKey })
    });
    
    const result = await response.json();
    
    if (result.success) {
      for (const img of images) {
        const record = statusRowsMap.get(img);
        record.statusBadge.innerText = "✅ 已触发";
        record.statusBadge.className = "status-badge text-xs px-2 py-1 rounded-full whitespace-nowrap light-badge-green dark-badge-green";
        record.infoMsg.innerHTML = '<i class="fas fa-check-circle text-green-500"></i> 已触发，等待构建完成（约5-15分钟）';
        record.checkBtn.disabled = false;
      }
      
      // 30秒后自动刷新一次
      setTimeout(async () => {
        await fetchReleaseAssets();
        for (const img of images) {
          if (statusRowsMap.has(img)) await updateTaskDisplay(img);
        }
      }, 30000);
    } else {
      for (const img of images) {
        const record = statusRowsMap.get(img);
        record.statusBadge.innerText = "❌ 触发失败";
        record.statusBadge.className = "status-badge text-xs px-2 py-1 rounded-full whitespace-nowrap light-badge-red dark-badge-red";
        record.infoMsg.innerHTML = `<i class="fas fa-exclamation-triangle text-red-500"></i> 触发失败: ${result.message}`;
      }
      alert(`触发失败: ${result.message}`);
    }
  } catch (err) {
    for (const img of images) {
      const record = statusRowsMap.get(img);
      record.statusBadge.innerText = "❌ 触发失败";
      record.infoMsg.innerHTML = `<i class="fas fa-exclamation-triangle text-red-500"></i> 网络错误: ${err.message}`;
    }
  } finally {
    submitBtn.innerHTML = '<i class="fas fa-cloud-download-alt"></i> 批量触发下载任务';
    submitBtn.disabled = false;
  }
}

// 刷新所有任务
async function refreshAllTasks() {
  await fetchReleaseAssets();
  for (const [img, record] of statusRowsMap.entries()) {
    await updateTaskDisplay(img);
  }
}

resetMirrorBtn.onclick = () => { mirrorPrefixInput.value = 'https://ghfast.top'; refreshAllTasks(); };
clearAllStatusBtn.onclick = () => {
  if (statusRowsMap.size > 0 && confirm('清空所有任务记录？')) {
    statusRowsMap.clear();
    statusPanel.innerHTML = '';
    const emptyDiv = document.createElement('div');
    emptyDiv.className = "flex flex-col items-center justify-center py-10 light-text-light dark-text-light";
    emptyDiv.innerHTML = '<i class="fas fa-inbox text-5xl mb-3 opacity-40"></i><p class="text-sm">暂无镜像任务</p>';
    statusPanel.appendChild(emptyDiv);
  }
};

refreshReleaseBtn.onclick = async () => {
  refreshReleaseBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 刷新中';
  refreshReleaseBtn.disabled = true;
  await refreshAllTasks();
  refreshReleaseBtn.innerHTML = '<i class="fas fa-sync-alt"></i> 刷新列表';
  refreshReleaseBtn.disabled = false;
};

form.onsubmit = async (e) => {
  e.preventDefault();
  const rawImages = imageListTextarea.value.trim();
  if (!rawImages) return alert('请输入至少一个镜像');
  const images = rawImages.split('\n').map(s => s.trim()).filter(s => s);
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) return alert('授权码不能为空');
  
  if (statusPanel.querySelector('.flex.flex-col.items-center.justify-center.py-10')) {
    statusPanel.innerHTML = '';
  }
  
  await triggerBatchImages(images, apiKey);
};

function escapeHtml(str) {
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// 初始加载 Release 信息
fetchReleaseAssets();
</script>
