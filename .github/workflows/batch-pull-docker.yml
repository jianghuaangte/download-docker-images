name: Batch Pull and Package Docker Images

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Docker镜像列表（每行一个）'
        required: true
        type: string

env:
  RELEASE_TAG: docker-images-batch

jobs:
  batch-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v2

      - name: Cleanup old release
        env:
          GH_TOKEN: ${{ secrets.JIANG_PAT_TOKEN }}
        run: |
          echo "=== Cleaning up old release ==="
          gh release delete ${{ env.RELEASE_TAG }} -y --cleanup-tag || echo "No existing release"
          git push origin --delete ${{ env.RELEASE_TAG }} || echo "No remote tag"

      - name: Build and upload images
        env:
          GH_TOKEN: ${{ secrets.JIANG_PAT_TOKEN }}
        run: |
          # 解析镜像列表
          IMAGES=$(echo '${{ github.event.inputs.images }}' | grep -v '^$')
          
          # 创建临时目录
          mkdir -p ./artifacts
          
          for image in $IMAGES; do
            echo "=== Processing: $image ==="
            SAFE_NAME=$(echo "$image" | tr '/' '_' | tr ':' '_')
            
            # 拉取镜像
            docker pull "$image"
            
            # 保存镜像
            docker save "$image" -o "${SAFE_NAME}.tar"
            
            # 检查文件大小
            FILE_SIZE=$(stat -c%s "${SAFE_NAME}.tar")
            FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
            echo "File size: ${FILE_SIZE_MB} MB"
            
            # 如果大于 900MB，使用 split 分割
            if [ $FILE_SIZE -gt 943718400 ]; then
              echo "File > 900MB, splitting into chunks..."
              
              # 分割成 950MB 的分片
              split -b 950m "${SAFE_NAME}.tar" "${SAFE_NAME}.part."
              
              # 创建重组脚本
              cat > "${SAFE_NAME}_reassemble.sh" << EOF
#!/bin/bash
cat ${SAFE_NAME}.part.* > ${SAFE_NAME}.tar
echo "Reassembled ${SAFE_NAME}.tar"
EOF
              chmod +x "${SAFE_NAME}_reassemble.sh"
              
              # 移动分片到 artifacts 目录
              mv ${SAFE_NAME}.part.* "${SAFE_NAME}_reassemble.sh" ./artifacts/
              
              # 删除原始文件
              rm "${SAFE_NAME}.tar"
              
              echo "✅ ${image} split into chunks"
            else
              # 小文件直接压缩
              gzip "${SAFE_NAME}.tar"
              mv "${SAFE_NAME}.tar.gz" ./artifacts/
              echo "✅ ${image} compressed"
            fi
          done
          
          # 创建新的 Release 并上传
          echo "=== Creating new release ==="
          cd ./artifacts
          
          # 创建 Release
          gh release create ${{ env.RELEASE_TAG }} \
            --title "Docker Images - $(date '+%Y-%m-%d %H:%M:%S')" \
            --notes "批量构建的 Docker 镜像" \
            * 2>/dev/null || echo "Release may already exist"
          
          echo "=== Upload complete ==="
          ls -la

      - name: Upload with release-action (fallback)
        if: failure()
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: "Docker Images Batch Build"
          artifacts: "./artifacts/*"
          token: ${{ secrets.JIANG_PAT_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
