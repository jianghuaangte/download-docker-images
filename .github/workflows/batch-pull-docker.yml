name: Batch Pull and Package Docker Images

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Docker镜像列表（每行一个）'
        required: true
        type: string

env:
  RELEASE_TAG: docker-images-batch

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Parse images list
        id: set-matrix
        run: |
          IMAGES_LIST=$(echo '${{ github.event.inputs.images }}' | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "matrix=${IMAGES_LIST}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJSON(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Pull Docker image
        run: |
          echo "Pulling Docker image: ${{ matrix.image }}"
          docker pull ${{ matrix.image }}

      - name: Save Docker image as tar
        run: |
          IMAGE_NAME=$(echo "${{ matrix.image }}" | tr '/' '_' | tr ':' '_')
          docker save -o "$IMAGE_NAME.tar" "${{ matrix.image }}"
          
          # 检查文件大小，如果大于1GB则分割
          FILE_SIZE=$(stat -c%s "$IMAGE_NAME.tar")
          if [ $FILE_SIZE -gt 1073741824 ]; then
            echo "File size ${FILE_SIZE} bytes, splitting..."
            split -b 500M "$IMAGE_NAME.tar" "${IMAGE_NAME}.part."
            echo "SPLIT=true" >> $GITHUB_ENV
          else
            echo "SPLIT=false" >> $GITHUB_ENV
          fi

      - name: Upload artifact (small file)
        if: env.SPLIT == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image }}
          path: "*.tar"
          retention-days: 1

      - name: Upload artifact (split parts)
        if: env.SPLIT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image }}
          path: "*.part.*"
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Reassemble split files
        run: |
          cd ./artifacts
          # 查找被分割的文件并重组
          for dir in */; do
            cd "$dir"
            if ls *.part.* 2>/dev/null | grep -q .; then
              BASE_NAME=$(ls *.part.* | head -1 | sed 's/\.part\..*//')
              cat ${BASE_NAME}.part.* > ${BASE_NAME}.tar
              rm ${BASE_NAME}.part.*
              echo "Reassembled ${BASE_NAME}.tar"
            fi
            cd ..
          done
          
          # 收集所有 tar 文件
          find . -name "*.tar" -type f -exec mv {} ./ \;
          echo "Final tar files:"
          ls -la *.tar

      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: "Batch Docker Images"
          artifacts: "*.tar"
          token: ${{ secrets.JIANG_PAT_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          artifactErrorsFailBuild: false
