name: Batch Pull and Package Docker Images

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Docker镜像列表（每行一个）'
        required: true
        type: string

env:
  RELEASE_TAG: docker-images-batch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Enable QEMU for multi-arch
        uses: docker/setup-qemu-action@v2

      - name: Pull and save images
        run: |
          IMAGES=$(echo '${{ github.event.inputs.images }}' | grep -v '^$')
          ARCH=$(uname -m)
          echo "Host architecture detected: $ARCH"

          # Map uname arch to Docker platform
          case "$ARCH" in
            x86_64) PLATFORM="linux/amd64" ;;
            aarch64) PLATFORM="linux/arm64" ;;
            *) PLATFORM="linux/amd64" ;;  # 默认amd64
          esac

          for image in $IMAGES; do
            echo "Processing: $image"
            SAFE_NAME=$(echo "$image" | tr '/' '_' | tr ':' '_')
            
            # 使用 buildx --platform 拉取镜像
            docker buildx imagetools inspect "$image" > /dev/null 2>&1
            if [ $? -ne 0 ]; then
              echo "Image $image does not exist or invalid, skipping..."
              continue
            fi

            echo "Pulling $image for platform $PLATFORM..."
            docker pull --platform $PLATFORM "$image"

            echo "Saving $image..."
            docker save "$image" -o "${SAFE_NAME}.tar"
            
            FILE_SIZE=$(stat -c%s "${SAFE_NAME}.tar")
            FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
            echo "File size: ${FILE_SIZE_MB} MB"
            
            if [ $FILE_SIZE -gt 943718400 ]; then
              echo "Splitting large file..."
              split -b 950m "${SAFE_NAME}.tar" "${SAFE_NAME}.part."
              rm "${SAFE_NAME}.tar"
            else
              gzip "${SAFE_NAME}.tar"
            fi
          done

          echo "Files generated:"
          ls -la

      - name: Delete old release
        run: |
          gh release delete ${{ env.RELEASE_TAG }} -y --repo ${{ github.repository }} || echo "No existing release"
          git push origin --delete ${{ env.RELEASE_TAG }} || echo "No remote tag"
        env:
          GH_TOKEN: ${{ secrets.JIANG_PAT_TOKEN }}

      - name: Create new release
        run: |
          gh release create ${{ env.RELEASE_TAG }} \
            --title "Docker Images Batch Build - $(date '+%Y-%m-%d %H:%M:%S')" \
            --notes "镜像列表:\n${{ github.event.inputs.images }}" \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.JIANG_PAT_TOKEN }}

      - name: Upload artifacts
        run: |
          for file in *.tar.gz *.part.*; do
            if [ -f "$file" ]; then
              gh release upload ${{ env.RELEASE_TAG }} "$file" \
                --repo ${{ github.repository }} \
                --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.JIANG_PAT_TOKEN }}
