name: Batch Pull and Package Docker Images

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Docker镜像列表（每行一个）'
        required: true
        type: string

env:
  RELEASE_TAG: docker-images-batch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v2

      - name: Build images
        run: |
          IMAGES=$(echo '${{ github.event.inputs.images }}' | grep -v '^$')
          
          for image in $IMAGES; do
            echo "Processing: $image"
            SAFE_NAME=$(echo "$image" | tr '/' '_' | tr ':' '_')
            
            docker pull "$image"
            docker save "$image" -o "${SAFE_NAME}.tar"
            
            FILE_SIZE=$(stat -c%s "${SAFE_NAME}.tar")
            FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
            echo "File size: ${FILE_SIZE_MB} MB"
            
            if [ $FILE_SIZE -gt 943718400 ]; then
              echo "Splitting large file..."
              split -b 950m "${SAFE_NAME}.tar" "${SAFE_NAME}.part."
              rm "${SAFE_NAME}.tar"
            else
              gzip "${SAFE_NAME}.tar"
            fi
          done
          
          echo "Files generated:"
          ls -la

      - name: Delete old release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.JIANG_PAT_TOKEN }}
          allowUpdates: true
          omitBody: true
          removeArtifacts: true
        continue-on-error: true

      - name: Create new release and upload
        uses: ncipollo/release-action@v2
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: "Docker Images Batch Build"
          body: |
            ## Docker 镜像批量构建
            
            **构建时间**: $(date '+%Y-%m-%d %H:%M:%S')
            
            ### 镜像列表:
