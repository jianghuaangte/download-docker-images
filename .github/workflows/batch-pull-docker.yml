name: Batch Pull and Package Docker Images

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Docker镜像列表（每行一个）'
        required: true
        type: string

env:
  RELEASE_TAG: docker-images-batch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Enable QEMU for multi-arch
        uses: docker/setup-qemu-action@v2

      - name: Pull and save images
        run: |
          set -e
          IMAGES=$(echo '${{ github.event.inputs.images }}' | grep -v '^$')

          # 获取 runner 架构对应的 Docker 平台
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) PLATFORM="linux/amd64" ;;
            aarch64) PLATFORM="linux/arm64" ;;
            *) PLATFORM="linux/amd64" ;;
          esac
          echo "Runner architecture detected: $ARCH -> $PLATFORM"

          for image in $IMAGES; do
            echo "Processing: $image"
            SAFE_NAME=$(echo "$image" | tr '/' '_' | tr ':' '_')

            # 检查镜像是否存在
            docker buildx imagetools inspect "$image" > /dev/null 2>&1
            if [ $? -ne 0 ]; then
              echo "⚠️ 镜像 $image 不存在或无效，跳过..."
              continue
            fi

            # 使用 buildx inspect 获取镜像支持的架构
            SUPPORTED_ARCHS=$(docker buildx imagetools inspect "$image" \
              --raw | jq -r '.manifests[].platform.architecture' | sort -u)
            echo "镜像支持的架构: $SUPPORTED_ARCHS"

            # 判断 runner 架构是否支持
            if echo "$SUPPORTED_ARCHS" | grep -qw "${ARCH}"; then
              echo "✅ 镜像支持当前架构 $ARCH"
            else
              echo "⚠️ 镜像不支持当前架构 $ARCH，尝试用 QEMU 模拟"
            fi

            # 拉取镜像
            echo "拉取 $image 平台 $PLATFORM..."
            docker pull --platform "$PLATFORM" "$image"

            # 导出 tar
            TAR_FILE="${SAFE_NAME}.tar"
            docker save "$image" -o "$TAR_FILE"

            FILE_SIZE=$(stat -c%s "$TAR_FILE")
            FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
            echo "文件大小: ${FILE_SIZE_MB} MB"

            if [ $FILE_SIZE -gt 943718400 ]; then
              echo "拆分大文件..."
              split -b 950m "$TAR_FILE" "${SAFE_NAME}.part."
              rm "$TAR_FILE"
            else
              gzip "$TAR_FILE"
            fi
          done

          echo "所有文件生成完成:"
          ls -la

      - name: Delete old release
        run: |
          gh release delete ${{ env.RELEASE_TAG }} -y --repo ${{ github.repository }} || echo "No existing release"
          git push origin --delete ${{ env.RELEASE_TAG }} || echo "No remote tag"
        env:
          GH_TOKEN: ${{ secrets.JIANG_PAT_TOKEN }}

      - name: Create new release
        run: |
          gh release create ${{ env.RELEASE_TAG }} \
            --title "Docker Images Batch Build - $(date '+%Y-%m-%d %H:%M:%S')" \
            --notes "镜像列表:\n${{ github.event.inputs.images }}" \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.JIANG_PAT_TOKEN }}

      - name: Upload artifacts
        run: |
          for file in *.tar.gz *.part.*; do
            if [ -f "$file" ]; then
              gh release upload ${{ env.RELEASE_TAG }} "$file" \
                --repo ${{ github.repository }} \
                --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.JIANG_PAT_TOKEN }}
