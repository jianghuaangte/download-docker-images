name: Batch Pull and Package Docker Images

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Docker镜像列表（每行一个）'
        required: true
        type: string

env:
  RELEASE_TAG: docker-images-batch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Enable QEMU for multi-arch
        uses: docker/setup-qemu-action@v2

      - name: Pull and save images
        run: |
          IMAGES=$(echo '${{ github.event.inputs.images }}' | grep -v '^$')
          
          for image in $IMAGES; do
            echo "========================================"
            echo "Processing: $image"
            
            # 从镜像标签中自动检测架构
            detect_arch() {
              local img="$1"
              # 检测常见的架构标识
              if echo "$img" | grep -qi "arm64v8\|arm64\|aarch64"; then
                echo "linux/arm64"
              elif echo "$img" | grep -qi "arm32v7\|armv7"; then
                echo "linux/arm/v7"
              elif echo "$img" | grep -qi "amd64\|x86_64"; then
                echo "linux/amd64"
              elif echo "$img" | grep -qi "386\|x86"; then
                echo "linux/386"
              elif echo "$img" | grep -qi "ppc64le"; then
                echo "linux/ppc64le"
              elif echo "$img" | grep -qi "s390x"; then
                echo "linux/s390x"
              else
                # 默认使用 amd64
                echo "linux/amd64"
              fi
            }
            
            TARGET_PLATFORM=$(detect_arch "$image")
            echo "Detected architecture: $TARGET_PLATFORM"
            
            # 为文件名创建安全名称（保留原始镜像名）
            SAFE_NAME=$(echo "$image" | tr '/' '_' | tr ':' '_')
            FINAL_NAME="${SAFE_NAME}"
            
            echo "Pulling $image for platform $TARGET_PLATFORM..."
            if ! docker pull --platform $TARGET_PLATFORM "$image"; then
              echo "❌ Failed to pull $image, skipping..."
              continue
            fi
            
            echo "Saving $image..."
            docker save "$image" -o "${FINAL_NAME}.tar"
            
            FILE_SIZE=$(stat -c%s "${FINAL_NAME}.tar")
            FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
            echo "File size: ${FILE_SIZE_MB} MB"
            
            if [ $FILE_SIZE -gt 943718400 ]; then
              echo "Splitting large file..."
              split -b 950m "${FINAL_NAME}.tar" "${FINAL_NAME}.part."
              rm "${FINAL_NAME}.tar"
            else
              echo "Compressing ${FINAL_NAME}.tar..."
              gzip "${FINAL_NAME}.tar"
            fi
            
            # 清理镜像节省空间
            docker rmi "$image" || true
            echo "========================================"
          done
          
          echo "========================================"
          echo "Files generated:"
          ls -lah *.tar.gz *.part.* 2>/dev/null || echo "No files found"
          echo "========================================"

      - name: Delete old release
        run: |
          gh release delete ${{ env.RELEASE_TAG }} -y --repo ${{ github.repository }} || echo "No existing release"
          git push origin --delete ${{ env.RELEASE_TAG }} || echo "No remote tag"
        env:
          GH_TOKEN: ${{ secrets.JIANG_PAT_TOKEN }}

      - name: Create new release
        run: |
          gh release create ${{ env.RELEASE_TAG }} \
            --title "Docker Images Batch - $(date '+%Y-%m-%d %H:%M:%S')" \
            --notes "镜像列表:\n${{ github.event.inputs.images }}" \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.JIANG_PAT_TOKEN }}

      - name: Upload artifacts
        run: |
          files_uploaded=0
          for file in *.tar.gz *.part.*; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              gh release upload ${{ env.RELEASE_TAG }} "$file" \
                --repo ${{ github.repository }} \
                --clobber
              files_uploaded=$((files_uploaded + 1))
            fi
          done
          
          if [ $files_uploaded -eq 0 ]; then
            echo "❌ No files were uploaded! Check if any images were successfully pulled."
            exit 1
          fi
          
          echo "✅ Successfully uploaded $files_uploaded files"
        env:
          GH_TOKEN: ${{ secrets.JIANG_PAT_TOKEN }}
