name: Batch Pull and Package Docker Images

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Docker镜像列表（每行一个）'
        required: true
        type: string

env:
  RELEASE_TAG: docker-images-batch

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Parse images list
        id: set-matrix
        run: |
          IMAGES_LIST=$(echo '${{ github.event.inputs.images }}' | sed '/^$/d' | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "matrix=${IMAGES_LIST}" >> $GITHUB_OUTPUT
          echo "Will build ${IMAGES_LIST}"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJSON(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Pull Docker image
        run: |
          echo "Pulling Docker image: ${{ matrix.image }}"
          docker pull ${{ matrix.image }}

      - name: Save Docker image as tar
        run: |
          IMAGE_NAME=$(echo "${{ matrix.image }}" | tr '/' '_' | tr ':' '_')
          docker save -o "$IMAGE_NAME.tar" "${{ matrix.image }}"
          echo "IMAGE_FILE=$IMAGE_NAME.tar" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_FILE }}
          path: ${{ env.IMAGE_FILE }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Move all tar files
        run: |
          find ./artifacts -name "*.tar" -type f -exec mv {} . \;
          ls -la *.tar

      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: "Batch Docker Images"
          artifacts: "*.tar"
          token: ${{ secrets.JIANG_PAT_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          artifactErrorsFailBuild: false
