name: Pull Docker Image and Export

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Docker 镜像名称'
        required: true

jobs:
  pull-export:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout 仓库
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ 拉取 Docker 镜像
      - name: Pull Docker image
        run: |
          docker pull "${{ github.event.inputs.image }}"

      # 4️⃣ 保存为 tar 文件
      - name: Save image as tar
        run: |
          IMAGE_NAME=$(echo "${{ github.event.inputs.image }}" | tr '/' '_' | tr ':' '_')

          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

          docker save \
            -o "${IMAGE_NAME}.tar" \
            "${{ github.event.inputs.image }}"

          ls -lh

          echo "Saved Docker image as ${IMAGE_NAME}.tar"

      # 5️⃣ 创建或更新固定 Release
      - name: Upload tar to fixed release
        uses: ncipollo/release-action@v1
        with:
          tag: docker-images
          name: Docker Images
          artifacts: "${{ env.IMAGE_NAME }}.tar"

          token: ${{ secrets.JIANG_PAT_TOKEN }}

          allowUpdates: true
          replacesArtifacts: true

          removeArtifacts: true

          generateReleaseNotes: false
          makeLatest: true
