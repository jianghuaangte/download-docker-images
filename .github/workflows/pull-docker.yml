name: Pull Docker Image and Export

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Docker 镜像名称'
        required: true

jobs:
  pull-export:
    runs-on: ubuntu-latest
    steps:

      # 1️⃣ Checkout 仓库
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ 安装 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ 拉取 Docker 镜像
      - name: Pull Docker image
        run: |
          echo "Pulling Docker image: ${{ github.event.inputs.image }}"
          docker pull ${{ github.event.inputs.image }}

      # 4️⃣ 保存 Docker 镜像为 tar
      - name: Save Docker image as tar
        run: |
          IMAGE_NAME=$(echo "${{ github.event.inputs.image }}" | tr '/' '_' | tr ':' '_')
          docker save -o "$IMAGE_NAME.tar" "${{ github.event.inputs.image }}"
          echo "Saved Docker image as $IMAGE_NAME.tar"

      # 5️⃣ 删除旧 Release（如果存在）
      - name: Delete old release if exists
        run: |
          gh release delete docker-images -y --cleanup-tag || echo "No existing release to delete"
        env:
          GH_TOKEN: ${{ secrets.JIANG_PAT_TOKEN }}

      # 6️⃣ 上传 tar 到固定 Release
      - name: Upload tar to fixed release
        uses: ncipollo/release-action@v1
        with:
          tag: docker-images
          name: Docker Image ${{ github.event.inputs.image }}
          artifacts: "*.tar"
          token: ${{ secrets.JIANG_PAT_TOKEN }}
          replacesArtifacts: true
          skipIfReleaseExists: false
          generateReleaseNotes: false
