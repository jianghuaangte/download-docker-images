name: Pull Docker Image and Export

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Docker 镜像名称'
        required: true

jobs:
  pull-export:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - uses: actions/checkout@v4

      # Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 拉取镜像
      - name: Pull Docker image
        run: docker pull ${{ github.event.inputs.image }}

      # 保存 tar
      - name: Save image as tar
        run: |
          IMAGE_NAME=$(echo "${{ github.event.inputs.image }}" | tr '/' '_' | tr ':' '_')
          docker save -o "$IMAGE_NAME.tar" "${{ github.event.inputs.image }}"
          echo "Saved Docker image as $IMAGE_NAME.tar"

      # 删除旧 release + tag
      - name: Delete old release if exists
        run: |
          gh release delete docker-images -y --cleanup-tag || echo "No existing release"
        env:
          GH_TOKEN: ${{ secrets.JIANG_PAT_TOKEN }}

      # 上传 release
      - name: Upload tar to fixed release
        uses: ncipollo/release-action@v1
        with:
          tag: docker-images
          name: Docker Image ${{ github.event.inputs.image }}
          artifacts: "*.tar"
          token: ${{ secrets.JIANG_PAT_TOKEN }}
          replacesArtifacts: true
          skipIfReleaseExists: false
          generateReleaseNotes: false
