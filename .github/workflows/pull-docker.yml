name: Pull Docker Image and Export

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Docker 镜像名称'
        required: true

jobs:
  pull-export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-docker@v4

      - name: Pull Docker image
        run: docker pull ${{ github.event.inputs.image }}

      - name: Save image to tar.gz
        run: |
          IMAGE_NAME=$(echo ${{ github.event.inputs.image }} | tr '/' '_' | tr ':' '_')
          docker save -o $IMAGE_NAME.tar ${{ github.event.inputs.image }}
          gzip $IMAGE_NAME.tar

      - name: Upload tar.gz to Release
        uses: ncipollo/release-action@v1
        with:
          tag: docker-image-${{ github.run_id }}
          name: Docker Image ${{ github.event.inputs.image }}
          artifacts: "*.tar.gz"
